<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Clock</title>
  <style>
    :root {
      --clock-size: min(82vw, 430px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Comic Sans MS", Arial, sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      touch-action: manipulation;
    }

    .app {
      width: min(100%, 520px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      width: 100%;
    }

    button {
      border: 2px solid #111;
      background: #fff;
      color: #111;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      min-height: 44px;
      min-width: 120px;
      box-shadow: 0 3px 0 #111;
      transition: transform 0.08s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.08s ease;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #111;
    }

    .check-result-correct {
      background: #1f9d4a;
      border-color: #147134;
      color: #fff;
      box-shadow: 0 3px 0 #147134;
    }

    .check-result-wrong {
      background: #c62e2e;
      border-color: #8d1b1b;
      color: #fff;
      box-shadow: 0 3px 0 #8d1b1b;
    }

    .time-btn,
    .show-btn {
      min-width: 140px;
      font-variant-numeric: tabular-nums;
    }

    .time-btn {
      letter-spacing: 0.04em;
    }

    .time-char {
      display: inline-block;
      animation: meter-roll 0.3s ease;
    }

    @keyframes meter-roll {
      0% {
        transform: translateY(-70%);
        opacity: 0.2;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .clock {
      width: var(--clock-size);
      height: var(--clock-size);
      border: 6px solid #000;
      border-radius: 50%;
      position: relative;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      user-select: none;
      touch-action: none;
    }

    .number {
      position: absolute;
      width: 34px;
      height: 34px;
      margin-left: -17px;
      margin-top: -17px;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: clamp(1rem, 2.6vw, 1.3rem);
      color: #000;
      pointer-events: none;
      z-index: 4;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      transform-origin: 50% calc(var(--clock-size) * 0.44);
      background: #000;
      pointer-events: none;
      z-index: 2;
    }

    .tick.big {
      height: 16px;
      margin-top: calc(var(--clock-size) * -0.44);
    }

    .tick.small {
      height: 9px;
      margin-top: calc(var(--clock-size) * -0.44);
      opacity: 0.9;
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 999px;
      background: #000;
      cursor: grab;
      touch-action: none;
    }

    .hand:active {
      cursor: grabbing;
    }

    .hour-hand {
      width: 10px;
      height: calc(var(--clock-size) * 0.23);
      z-index: 6;
    }

    .minute-hand {
      width: 6px;
      height: calc(var(--clock-size) * 0.35);
      z-index: 7;
    }

    .second-hand {
      width: 2px;
      height: calc(var(--clock-size) * 0.38);
      z-index: 7;
      display: none;
    }

    .center-seconds-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      border: 2px solid #000;
      border-radius: 50%;
      background: #fff;
      color: transparent;
      font-size: 0;
      padding: 0;
      transform: translate(-50%, -50%);
      box-shadow: none;
      z-index: 9;
    }

    .center-seconds-btn.on {
      background: #000;
    }

    .center-seconds-btn.off {
      background: #fff;
    }

    .center-seconds-btn:active {
      transform: translate(-50%, -50%) scale(0.95);
      box-shadow: none;
    }

    @media (max-width: 420px) {
      :root {
        --clock-size: min(88vw, 380px);
      }

      button {
        min-width: 104px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="controls">
      <button id="targetTimeBtn" class="time-btn" type="button" aria-label="Target time">12:00</button>
      <button id="showBtn" class="show-btn" type="button">Show</button>
    </div>

    <section class="clock" id="clock" aria-label="Analog clock for learning time">
      <button id="secondsBtn" class="center-seconds-btn off" type="button" aria-label="Toggle seconds hand" aria-pressed="false"></button>
    </section>

    <button id="checkBtn" type="button">Check Answer</button>
  </main>

  <script>
    const clock = document.getElementById("clock");
    const checkBtn = document.getElementById("checkBtn");
    const secondsBtn = document.getElementById("secondsBtn");
    const targetTimeBtn = document.getElementById("targetTimeBtn");
    const showBtn = document.getElementById("showBtn");

    const hourHand = document.createElement("div");
    hourHand.className = "hand hour-hand";
    const minuteHand = document.createElement("div");
    minuteHand.className = "hand minute-hand";
    const secondHand = document.createElement("div");
    secondHand.className = "hand second-hand";

    let currentMinutes = 0;
    let currentSeconds = 0;
    let targetHour = 12;
    let targetMinute = 0;
    let targetSecond = 0;
    let dragMode = null;
    let prevHourAngle = 0;
    let prevMinuteAngle = 0;
    let prevSecondAngle = 0;
    let isSecondsMode = false;
    let isShowActive = false;
    let checkResultTimer = null;

    function createTicksAndNumbers() {
      for (let i = 0; i < 60; i += 1) {
        const tick = document.createElement("div");
        tick.className = `tick ${i % 5 === 0 ? "big" : "small"}`;
        tick.style.transform = `translateX(-50%) rotate(${i * 6}deg)`;
        clock.appendChild(tick);
      }

      const radius = 36;
      for (let num = 1; num <= 12; num += 1) {
        const angle = (num / 12) * Math.PI * 2;
        const numberEl = document.createElement("div");
        numberEl.className = "number";
        numberEl.textContent = num;
        const x = 50 + radius * Math.sin(angle);
        const y = 50 - radius * Math.cos(angle);
        numberEl.style.left = `${x}%`;
        numberEl.style.top = `${y}%`;
        clock.appendChild(numberEl);
      }

      clock.appendChild(hourHand);
      clock.appendChild(minuteHand);
      clock.appendChild(secondHand);
    }

    function normalizeAngle(angle) {
      return ((angle % 360) + 360) % 360;
    }

    function shortestAngleDelta(prev, next) {
      const a = normalizeAngle(prev);
      const b = normalizeAngle(next);
      let delta = b - a;
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;
      return delta;
    }

    function setClockFromMinutes(totalMinutes) {
      currentMinutes = ((totalMinutes % 720) + 720) % 720;
      const hourAngle = currentMinutes * 0.5;
      const minuteAngle = (currentMinutes % 60) * 6;
      hourHand.style.transform = `translate(-50%, -100%) rotate(${hourAngle}deg)`;
      minuteHand.style.transform = `translate(-50%, -100%) rotate(${minuteAngle}deg)`;
      prevHourAngle = hourAngle;
      prevMinuteAngle = minuteAngle;
    }

    function setSecondHandFromSeconds(totalSeconds) {
      currentSeconds = ((totalSeconds % 60) + 60) % 60;
      const secondAngle = currentSeconds * 6;
      secondHand.style.transform = `translate(-50%, -100%) rotate(${secondAngle}deg)`;
      prevSecondAngle = secondAngle;
    }

    function pointerAngleFromCenter(clientX, clientY) {
      const rect = clock.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const angle = Math.atan2(dx, -dy) * (180 / Math.PI);
      return normalizeAngle(angle);
    }

    function getEventPoint(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      if (e.changedTouches && e.changedTouches.length > 0) {
        return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function updateByMinuteDrag(angle) {
      const delta = shortestAngleDelta(prevMinuteAngle, angle);
      currentMinutes += delta / 6;
      setClockFromMinutes(currentMinutes);
    }

    function updateByHourDrag(angle) {
      const delta = shortestAngleDelta(prevHourAngle, angle);
      currentMinutes += delta * 2;
      setClockFromMinutes(currentMinutes);
    }

    function updateBySecondDrag(angle) {
      const delta = shortestAngleDelta(prevSecondAngle, angle);
      currentSeconds += delta / 6;
      setSecondHandFromSeconds(currentSeconds);
    }

    function onMove(e) {
      if (!dragMode) return;
      e.preventDefault();
      const p = getEventPoint(e);
      const angle = pointerAngleFromCenter(p.x, p.y);
      if (dragMode === "minute") {
        updateByMinuteDrag(angle);
      } else if (dragMode === "hour") {
        updateByHourDrag(angle);
      } else if (dragMode === "second") {
        updateBySecondDrag(angle);
      }
      updateShowButtonIfActive();
    }

    function endDrag() {
      dragMode = null;
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("mouseup", endDrag);
      window.removeEventListener("touchend", endDrag);
      window.removeEventListener("touchcancel", endDrag);
    }

    function startDrag(type, e) {
      dragMode = type;
      e.preventDefault();
      const p = getEventPoint(e);
      const angle = pointerAngleFromCenter(p.x, p.y);
      if (type === "minute") prevMinuteAngle = angle;
      if (type === "hour") prevHourAngle = angle;
      if (type === "second") prevSecondAngle = angle;
      window.addEventListener("mousemove", onMove, { passive: false });
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("mouseup", endDrag);
      window.addEventListener("touchend", endDrag);
      window.addEventListener("touchcancel", endDrag);
    }

    function formatDisplayTime(hour12, minute, second, includeSeconds) {
      const base = `${hour12}:${String(minute).padStart(2, "0")}`;
      if (!includeSeconds) return base;
      return `${base}:${String(second).padStart(2, "0")}`;
    }

    function updateTargetTimeButton() {
      const timeText = formatDisplayTime(targetHour, targetMinute, targetSecond, isSecondsMode);
      targetTimeBtn.textContent = "";
      for (let i = 0; i < timeText.length; i += 1) {
        const ch = document.createElement("span");
        ch.className = "time-char";
        ch.style.animationDelay = `${i * 35}ms`;
        ch.textContent = timeText[i];
        targetTimeBtn.appendChild(ch);
      }
    }

    function randomTargetTime() {
      targetHour = Math.floor(Math.random() * 12) + 1;
      targetMinute = Math.floor(Math.random() * 60);
      targetSecond = Math.floor(Math.random() * 60);
      updateTargetTimeButton();
    }

    function flashCheckButton(isCorrect) {
      checkBtn.classList.remove("check-result-correct", "check-result-wrong");
      checkBtn.classList.add(isCorrect ? "check-result-correct" : "check-result-wrong");
      if (checkResultTimer) clearTimeout(checkResultTimer);
      checkResultTimer = setTimeout(() => {
        checkBtn.classList.remove("check-result-correct", "check-result-wrong");
      }, 1000);
    }

    function getCurrentClockParts() {
      const minutesWrapped = ((currentMinutes % 720) + 720) % 720;
      const roundedDialMinutes = Math.round(minutesWrapped) % 720;
      const secondsWrapped = ((Math.round(currentSeconds) % 60) + 60) % 60;
      const hour12 = Math.floor(roundedDialMinutes / 60) % 12 || 12;
      const minute = roundedDialMinutes % 60;
      const second = secondsWrapped;
      return { hour12, minute, second };
    }

    function checkAnswer() {
      const current = getCurrentClockParts();
      const hourMatch = current.hour12 === targetHour;
      const minuteMatch = current.minute === targetMinute;
      const secondMatch = !isSecondsMode || current.second === targetSecond;
      flashCheckButton(hourMatch && minuteMatch && secondMatch);
    }

    function getCurrentDisplayTime() {
      const { hour12, minute, second } = getCurrentClockParts();
      return formatDisplayTime(hour12, minute, second, isSecondsMode);
    }

    function refreshSecondsButton() {
      secondsBtn.classList.toggle("on", isSecondsMode);
      secondsBtn.classList.toggle("off", !isSecondsMode);
      secondsBtn.setAttribute("aria-pressed", String(isSecondsMode));
    }

    function toggleSecondsHand() {
      isSecondsMode = !isSecondsMode;
      secondHand.style.display = isSecondsMode ? "block" : "none";
      refreshSecondsButton();
      updateTargetTimeButton();
      updateShowButtonIfActive();
    }

    function updateShowButtonIfActive() {
      if (!isShowActive) return;
      showBtn.textContent = getCurrentDisplayTime();
    }

    function toggleShowButton() {
      isShowActive = !isShowActive;
      if (!isShowActive) {
        showBtn.textContent = "Show";
        return;
      }
      updateShowButtonIfActive();
    }

    function setupEvents() {
      minuteHand.addEventListener("mousedown", (e) => startDrag("minute", e));
      minuteHand.addEventListener("touchstart", (e) => startDrag("minute", e), { passive: false });
      hourHand.addEventListener("mousedown", (e) => startDrag("hour", e));
      hourHand.addEventListener("touchstart", (e) => startDrag("hour", e), { passive: false });
      secondHand.addEventListener("mousedown", (e) => startDrag("second", e));
      secondHand.addEventListener("touchstart", (e) => startDrag("second", e), { passive: false });
      checkBtn.addEventListener("click", checkAnswer);
      targetTimeBtn.addEventListener("click", randomTargetTime);
      showBtn.addEventListener("click", toggleShowButton);
      secondsBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleSecondsHand();
      });
    }

    createTicksAndNumbers();
    setupEvents();
    setClockFromMinutes(0);
    setSecondHandFromSeconds(0);
    refreshSecondsButton();
    randomTargetTime();
  </script>
</body>
</html>

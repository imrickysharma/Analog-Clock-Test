<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Clock Academy</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Clock Academy" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon-precomposed" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="shortcut icon" href="icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Mono:wght@400;500&family=Sen:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cs: min(78vw, 400px);
      --bg: #f5f0e8;
      --ink: #1a1612;
      --accent: #c84b2f;
      --gold: #FD5B04;
      --face: #fffef9;
      --soft: #e8e0d0;
      --muted: #9a8f80;
      --correct: #2d7a4f;
      --wrong: #c84b2f;
      --shadow: rgba(26,22,18,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      min-height: 100svh;
      height: 100svh;
      font-family: 'Fraunces', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      position: fixed;
      inset: 0;
      padding: 20px;
      overflow: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a1612' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100%, 560px);
      margin-left: auto;
      margin-right: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .header-title {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
    }
    .header-title span {
      color: var(--accent);
    }

    /* ── Score strip ── */
    .score-strip {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      background: var(--ink);
      border-radius: 100px;
      padding: 10px 28px;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ffffff;
    }
    .score-value {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: var(--face);
    }
    .score-value.correct { color: #ffffff; }
    .score-value.streak { color: #ffffff; }

    /* ── Challenge card ── */
    .challenge-card {
      --show-size: 88px;
      background: var(--ink);
      color: var(--face);
      border-radius: 20px;
      padding: 18px 0 18px 24px;
      margin-bottom: 24px;
      position: relative;
      width: 100%;
      max-width: 460px;
      min-height: var(--show-size);
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .challenge-card > div:first-child {
      min-width: 0;
      width: 100%;
      padding-right: var(--show-size);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(var(--show-size) - 36px);
    }
    .challenge-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8a8070;
      margin-bottom: 4px;
    }
    .challenge-time {
      -webkit-appearance: none;
      appearance: none;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 100%;
      font-size: 4.2rem;
      font-weight: 600;
      letter-spacing: -0.05em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      cursor: pointer;
      background: transparent;
      border: none;
      color: inherit;
      padding: 0;
      text-align: center;
      white-space: nowrap;
    }
    #targetTimeText {
      display: inline-block;
      font-family: inherit;
      font-size: 1em;
      font-weight: inherit;
      letter-spacing: inherit;
      line-height: 1;
    }
    .challenge-time.hard-mode #targetTimeText {
      font-size: 2.9952em;
    }
    .challenge-time.seconds-mode {
      font-size: inherit;
      letter-spacing: -0.07em;
    }
    .challenge-time:hover {
      opacity: 0.92;
    }
    .challenge-actions {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: var(--show-size);
      display: flex;
      align-items: stretch;
    }
    .challenge-actions .pill-btn {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      border: none;
      border-radius: 18px 20px 20px 18px;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .challenge-card {
        --show-size: 76px;
        padding: 16px 0 16px 18px;
      }
      .challenge-card > div:first-child {
        padding-right: var(--show-size);
        min-height: calc(var(--show-size) - 30px);
      }
      .challenge-actions .pill-btn {
        width: 100%;
        height: 100%;
      }
      .challenge-time {
        font-size: 3.35rem;
      }
      .challenge-time.seconds-mode {
        font-size: inherit;
      }
    }
    .pill-btn {
      font-family: 'DM Mono', monospace;
      font-size: 1.22rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.10), rgba(255,255,255,0) 30%),
        linear-gradient(180deg, #2c2823 0%, #1e1a16 45%, #15120f 100%);
      color: #ffffff;
      padding: 0 18px;
      cursor: pointer;
      min-width: 100px;
      min-height: 72px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.05),
        -10px 12px 18px rgba(0,0,0,0.18),
        -3px 4px 8px rgba(0,0,0,0.12);
      transition: background 0.15s, color 0.15s, transform 0.1s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .pill-btn:hover {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.01) 30%),
        linear-gradient(180deg, #332e28 0%, #24201b 45%, #181511 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        inset 0 -1px 0 rgba(0,0,0,0.48),
        inset 0 0 0 1px rgba(255,255,255,0.06),
        -12px 14px 20px rgba(0,0,0,0.2),
        -3px 5px 10px rgba(0,0,0,0.14);
    }
    .pill-btn:active {
      transform: scale(0.985);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.52),
        inset 0 0 0 1px rgba(255,255,255,0.04),
        -6px 8px 12px rgba(0,0,0,0.16);
    }
    .pill-btn.show-active {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0) 32%),
        linear-gradient(180deg, #ff7a2f 0%, #FD5B04 54%, #dc4700 100%);
      color: var(--ink);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 0 -1px 0 rgba(130,43,0,0.34),
        inset 0 0 0 1px rgba(255,255,255,0.08),
        -8px 10px 16px rgba(0,0,0,0.14);
    }

    /* ── Difficulty pills ── */
    .difficulty-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .diff-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1.5px solid var(--ink);
      background: transparent;
      color: var(--ink);
      border-radius: 100px;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 34px;
    }
    .diff-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--face);
    }
    .diff-btn:not(.active):hover {
      border-color: var(--muted);
      color: var(--ink);
    }

    /* ── Clock ── */
    .clock-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .clock {
      width: var(--cs);
      height: var(--cs);
      border-radius: 50%;
      position: relative;
      background: var(--face);
      user-select: none;
      touch-action: none;
      box-shadow:
        0 0 0 8px var(--bg),
        0 0 0 10px var(--soft),
        0 12px 48px var(--shadow),
        inset 0 1px 3px rgba(255,255,255,0.8);
    }

    /* Outer ring */
    .clock::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 3px solid var(--ink);
      pointer-events: none;
    }

    .number {
      position: absolute;
      width: 30px;
      height: 30px;
      margin-left: -15px;
      margin-top: -15px;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: clamp(0.9rem, 2.3vw, 1.1rem);
      color: var(--ink);
      pointer-events: none;
      z-index: 4;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% calc(var(--cs) * 0.45);
      pointer-events: none;
      z-index: 2;
    }
    .tick.big {
      width: 2.5px;
      height: 14px;
      background: var(--ink);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -1.25px;
    }
    .tick.small {
      width: 1.5px;
      height: 7px;
      background: var(--muted);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -0.75px;
      opacity: 0.6;
    }
    .tick.fifth {
      width: 2px;
      height: 10px;
      background: var(--muted);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -1px;
      opacity: 0.8;
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 999px;
      cursor: grab;
      touch-action: none;
      transition: filter 0.15s;
    }
    .hand:active { cursor: grabbing; }
    .hand:hover { filter: brightness(1.3); }

    .hour-hand {
      width: 9px;
      height: calc(var(--cs) * 0.24);
      background: var(--ink);
      z-index: 6;
      border-radius: 999px 999px 4px 4px;
    }
    .minute-hand {
      width: 5px;
      height: calc(var(--cs) * 0.36);
      background: var(--ink);
      z-index: 7;
      border-radius: 999px 999px 3px 3px;
    }
    .second-hand {
      width: 2px;
      height: calc(var(--cs) * 0.40);
      background: var(--accent);
      z-index: 8;
      display: none;
    }
    /* second hand counterbalance tail */
    .second-hand::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 16px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
    }

    /* Center hint button — invisible but clickable, dot drawn via ::before */
    .center-hint-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      transform: translate(-50%, -50%);
      background: transparent;
      border: none;
      border-radius: 50%;
      color: transparent;
      cursor: default;
      z-index: 12;
      padding: 0;
      box-shadow: none;
    }
    /* The visible ink dot */
    .center-hint-btn::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      transform: translate(-50%, -50%);
      background: var(--ink);
      border-radius: 50%;
      pointer-events: none;
    }
    .center-hint-btn:active {
      transform: translate(-50%, -50%) scale(0.92);
      box-shadow: none;
    }

    /* ── Live time badge ── */
    .current-time-badge {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--face);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      padding: 5px 14px;
      border-radius: 100px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .current-time-badge.visible { opacity: 1; }

    /* ── Hint arc (ghost hand) ── */

    /* ── Bottom controls ── */
    .bottom-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .check-btn {
      font-family: 'Sen', sans-serif;
      font-size: 1.35rem;
      font-weight: 500;
      font-style: normal;
      letter-spacing: 0.02em;
      text-transform: none;
      background: var(--ink);
      color: var(--face);
      border: 2px solid var(--ink);
      border-radius: 100px;
      padding: 14px 36px;
      cursor: pointer;
      min-height: 52px;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 0 #0a0806;
    }
    .check-btn:hover {
      background: #2e2820;
      box-shadow: 0 4px 0 #0a0806, 0 0 0 3px var(--soft);
    }
    .check-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0a0806;
    }
    .check-btn.correct {
      background: #06C60A;
      border-color: #049a08;
      box-shadow: 0 4px 0 #049a08;
      color: var(--ink);
    }
    .check-btn.wrong {
      background: #FD5B04;
      border-color: #dc4700;
      box-shadow: 0 4px 0 #dc4700;
    }

    .hint-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--soft);
      border-radius: 100px;
      padding: 14px 20px;
      cursor: pointer;
      min-height: 52px;
      transition: all 0.15s;
    }
    .hint-btn:hover {
      border-color: var(--muted);
      color: var(--ink);
    }
    .hint-btn:active { transform: scale(0.97); }

    /* ── Seconds mode label ── */
    .mode-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mode-label::before,
    .mode-label::after {
      content: '';
      height: 1px;
      width: 40px;
      background: var(--soft);
    }



    /* ── Hint overlay ghost ── */
    .hint-hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .hint-hand.visible { opacity: 0.28; }
    .hint-hour {
      width: 9px;
      height: calc(var(--cs) * 0.24);
      background: var(--accent);
      border-radius: 999px 999px 4px 4px;
    }
    .hint-minute {
      width: 5px;
      height: calc(var(--cs) * 0.36);
      background: var(--accent);
      border-radius: 999px 999px 3px 3px;
    }

    @media (max-width: 420px) {
      :root { --cs: min(86vw, 360px); }
      .check-btn { padding: 12px 28px; }
      .challenge-card { padding: 16px 22px; }
      .score-strip { padding: 9px 20px; gap: 14px; }
    }

    /* Dragging state */
    body.dragging { cursor: grabbing !important; }
    body.dragging * { cursor: grabbing !important; }
  </style>
</head>
<body>
  <main class="app">

    <!-- Score strip -->
    <div class="score-strip">
      <div class="score-item">
        <span class="score-label">Score</span>
        <span class="score-value correct" id="scoreCorrect">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Streak</span>
        <span class="score-value streak" id="scoreStreak">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Best</span>
        <span class="score-value" id="scoreBest">0</span>
      </div>
    </div>

    <!-- Difficulty -->
    <div class="difficulty-row">
      <button class="diff-btn active" data-diff="easy" type="button">Easy</button>
      <button class="diff-btn" data-diff="medium" type="button">Medium</button>
      <button class="diff-btn" data-diff="hard" type="button">Hard</button>
    </div>

    <!-- Challenge card -->
    <div class="challenge-card">
      <div>
        <button class="challenge-time" id="challengeTime" type="button" aria-label="Generate new time">
          <span id="targetTimeText">12:00</span>
        </button>
      </div>
      <div class="challenge-actions">
        <button class="pill-btn" id="showBtn" type="button">Show</button>
      </div>
    </div>

    <!-- Clock face -->
    <div class="clock-wrap">
      <section class="clock" id="clock" aria-label="Interactive analog clock">
        <button class="center-hint-btn" id="centerHintBtn" type="button" aria-label="Show hint">?</button>
      </section>
      <div class="current-time-badge" id="currentTimeBadge">12:00</div>
    </div>

    <!-- Bottom controls -->
    <div class="bottom-controls">
      <button class="check-btn" id="checkBtn" type="button">Check Answer</button>
    </div>



  </main>



  <script>
    // Remove accidental pasted text nodes (e.g., ```html / ```) that can shift layout.
    Array.from(document.body.childNodes).forEach(node => {
      if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) node.remove();
    });

    // Prevent double-tap zoom and pinch zoom shifting on iPhone Safari.
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (event) => {
      const now = Date.now();
      if (now - lastTouchEnd < 300) event.preventDefault();
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('gesturestart', (event) => {
      event.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturechange', (event) => {
      event.preventDefault();
    }, { passive: false });

    /* ── Constants & state ── */
    const DIFFICULTIES = {
      easy:   { seconds: false },
      medium: { seconds: false },
      hard:   { seconds: true },
    };

    let diff = 'easy';
    let targetHour = 12, targetMinute = 0, targetSecond = 0;
    let currentMinutes = 0, currentSeconds = 0;
    let dragMode = null;
    let prevAngle = 0;
    let isSecondsMode = false;
    let isShowActive = false;
    let score = 0, streak = 0, bestStreak = 0;
    let checkTimer = null, hintTimer = null;

    /* ── DOM refs ── */
    const clockEl        = document.getElementById('clock');
    const checkBtn       = document.getElementById('checkBtn');
    const challengeTimeEl = document.getElementById('challengeTime');
    const showBtn        = document.getElementById('showBtn');
    const centerHintBtn  = document.getElementById('centerHintBtn');
    const badge          = document.getElementById('currentTimeBadge');

    const scoreCorrectEl = document.getElementById('scoreCorrect');
    const scoreStreakEl  = document.getElementById('scoreStreak');
    const scoreBestEl    = document.getElementById('scoreBest');

    /* ── Build clock face ── */
    const hourHand   = document.createElement('div');
    const minuteHand = document.createElement('div');
    const secondHand = document.createElement('div');
    const hintHour   = document.createElement('div');
    const hintMinute = document.createElement('div');

    hourHand.className   = 'hand hour-hand';
    minuteHand.className = 'hand minute-hand';
    secondHand.className = 'hand second-hand';
    hintHour.className   = 'hint-hand hint-hour';
    hintMinute.className = 'hint-hand hint-minute';

    function buildClock() {
      for (let i = 0; i < 60; i++) {
        const tick = document.createElement('div');
        if (i % 5 === 0) tick.className = 'tick big';
        else if (i % 5 !== 0 && i % 5 !== 0) tick.className = 'tick small';
        else tick.className = 'tick fifth';
        tick.style.transform = `rotate(${i * 6}deg)`;
        clockEl.appendChild(tick);
      }
      const r = 37;
      for (let n = 1; n <= 12; n++) {
        const angle = (n / 12) * Math.PI * 2;
        const el = document.createElement('div');
        el.className = 'number';
        el.textContent = n;
        el.style.left = `${50 + r * Math.sin(angle)}%`;
        el.style.top  = `${50 - r * Math.cos(angle)}%`;
        clockEl.appendChild(el);
      }
      clockEl.appendChild(hintHour);
      clockEl.appendChild(hintMinute);
      clockEl.appendChild(hourHand);
      clockEl.appendChild(minuteHand);
      clockEl.appendChild(secondHand);
    }

    /* ── Angle helpers ── */
    function normAngle(a) { return ((a % 360) + 360) % 360; }
    function shortDelta(prev, next) {
      let d = normAngle(next) - normAngle(prev);
      if (d > 180)  d -= 360;
      if (d < -180) d += 360;
      return d;
    }

    function setClockFromMinutes(m) {
      currentMinutes = ((m % 720) + 720) % 720;
      const hA = currentMinutes * 0.5;
      const mA = (currentMinutes % 60) * 6;
      hourHand.style.transform   = `translate(-50%, -100%) rotate(${hA}deg)`;
      minuteHand.style.transform = `translate(-50%, -100%) rotate(${mA}deg)`;
    }

    function setClockFromSeconds(s) {
      currentSeconds = ((s % 60) + 60) % 60;
      const sA = currentSeconds * 6;
      secondHand.style.transform = `translate(-50%, -100%) rotate(${sA}deg)`;
    }

    /* ── Pointer helpers ── */
    function getPoint(e) {
      if (e.touches?.length)        return { x: e.touches[0].clientX,        y: e.touches[0].clientY };
      if (e.changedTouches?.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function pointerAngle(clientX, clientY) {
      const r = clockEl.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      return normAngle(Math.atan2(clientX - cx, -(clientY - cy)) * (180 / Math.PI));
    }

    /* ── Drag logic ── */
    function onMove(e) {
      if (!dragMode) return;
      e.preventDefault();
      const { x, y } = getPoint(e);
      const angle = pointerAngle(x, y);
      const delta = shortDelta(prevAngle, angle);
      prevAngle = angle;

      if (dragMode === 'minute') {
        currentMinutes += delta / 6;
        setClockFromMinutes(currentMinutes);
      } else if (dragMode === 'hour') {
        currentMinutes += delta * 2;
        setClockFromMinutes(currentMinutes);
      } else if (dragMode === 'second') {
        currentSeconds += delta / 6;
        setClockFromSeconds(currentSeconds);
      }
      if (isShowActive) updateBadge();
    }

    function endDrag() {
      dragMode = null;
      document.body.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('mouseup', endDrag);
      window.removeEventListener('touchend', endDrag);
      window.removeEventListener('touchcancel', endDrag);
    }

    function startDrag(type, e) {
      dragMode = type;
      e.preventDefault();
      document.body.classList.add('dragging');
      const { x, y } = getPoint(e);
      prevAngle = pointerAngle(x, y);
      window.addEventListener('mousemove', onMove, { passive: false });
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', endDrag);
      window.addEventListener('touchend', endDrag);
      window.addEventListener('touchcancel', endDrag);
    }

    /* ── Current time reading ── */
    function getClockParts() {
      const mw = ((currentMinutes % 720) + 720) % 720;
      const sw = ((Math.round(currentSeconds) % 60) + 60) % 60;
      const rm = Math.round(mw) % 720;
      return {
        hour12: Math.floor(rm / 60) % 12 || 12,
        minute:  rm % 60,
        second:  sw,
      };
    }

    function fmt(h, m, s, secs) {
      const base = `${h}:${String(m).padStart(2,'0')}`;
      return secs ? `${base}:${String(s).padStart(2,'0')}` : base;
    }

    /* ── Badge ── */
    function updateBadge() {
      const { hour12, minute, second } = getClockParts();
      badge.textContent = fmt(hour12, minute, second, isSecondsMode);
    }

    /* ── Target time display ── */
    const targetTimeTextEl = document.getElementById('targetTimeText');

    function updateTargetDisplay() {
      challengeTimeEl.classList.toggle('seconds-mode', isSecondsMode);
      challengeTimeEl.classList.toggle('hard-mode', diff === 'hard');
      targetTimeTextEl.textContent = fmt(targetHour, targetMinute, targetSecond, isSecondsMode);
    }

    /* ── Random target ── */
    function randomTarget() {
      targetHour   = Math.floor(Math.random() * 12) + 1;
      targetSecond = isSecondsMode ? Math.floor(Math.random() * 60) : 0;

      if (diff === 'easy') {
        targetMinute = Math.floor(Math.random() * 12) * 5 + [0, 5][Math.floor(Math.random() * 2)];
      } else {
        targetMinute = Math.floor(Math.random() * 60);
      }

      updateTargetDisplay();
      hideHint();
      checkBtn.classList.remove('correct', 'wrong');
      checkBtn.textContent = 'Check Answer';

      if (isShowActive) {
        isShowActive = false;
        showBtn.classList.remove('show-active');
        showBtn.textContent = 'Show';
        badge.classList.remove('visible');
      }
    }

    /* ── Show button ── */
    function updateShowBtn() {
      showBtn.textContent = isShowActive ? 'Hide' : 'Show';
    }

    function toggleShow() {
      isShowActive = !isShowActive;
      showBtn.classList.toggle('show-active', isShowActive);
      updateShowBtn();
      if (!isShowActive) {
        badge.classList.remove('visible');
      } else {
        updateBadge();
        badge.classList.add('visible');
      }
    }

    /* ── Hint ghost hands ── */
    function showHint() {
      const totalM = targetHour * 60 + targetMinute;
      const hA = totalM * 0.5;
      const mA = targetMinute * 6;
      hintHour.style.transform   = `translate(-50%, -100%) rotate(${hA}deg)`;
      hintMinute.style.transform = `translate(-50%, -100%) rotate(${mA}deg)`;
      hintHour.classList.add('visible');
      hintMinute.classList.add('visible');
      if (hintTimer) clearTimeout(hintTimer);
      hintTimer = setTimeout(hideHint, 3000);
    }
    function hideHint() {
      hintHour.classList.remove('visible');
      hintMinute.classList.remove('visible');
    }

    function checkAnswer() {
      const { hour12, minute, second } = getClockParts();
      const hOk = hour12 === targetHour;
      const mOk = minute  === targetMinute;
      const sOk = !isSecondsMode || second === targetSecond;
      const correct = hOk && mOk && sOk;

      checkBtn.classList.remove('correct', 'wrong');
      checkBtn.classList.add(correct ? 'correct' : 'wrong');
      checkBtn.textContent = correct ? 'Correct' : 'Try Again';

      if (correct) {
        score++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        setTimeout(() => randomTarget(), 1400);
      } else {
        streak = 0;
        setTimeout(() => {
          checkBtn.classList.remove('correct', 'wrong');
          checkBtn.textContent = 'Check Answer';
        }, 1200);
      }

      scoreCorrectEl.textContent = score;
      scoreStreakEl.textContent  = streak;
      scoreBestEl.textContent    = bestStreak;
    }

    /* ── Seconds mode ── */
    function setSecondsMode(enabled) {
      isSecondsMode = enabled;
      secondHand.style.display = isSecondsMode ? 'block' : 'none';
      updateTargetDisplay();
      if (isShowActive) updateBadge();
    }

    /* ── Difficulty ── */
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        diff = btn.dataset.diff;
        setSecondsMode(DIFFICULTIES[diff].seconds);
        randomTarget();
      });
    });

    /* ── Events ── */
    hourHand.addEventListener('mousedown',   e => startDrag('hour', e));
    hourHand.addEventListener('touchstart',  e => startDrag('hour', e), { passive: false });
    minuteHand.addEventListener('mousedown', e => startDrag('minute', e));
    minuteHand.addEventListener('touchstart',e => startDrag('minute', e), { passive: false });
    secondHand.addEventListener('mousedown', e => startDrag('second', e));
    secondHand.addEventListener('touchstart',e => startDrag('second', e), { passive: false });

    checkBtn.addEventListener('click',       checkAnswer);
    challengeTimeEl.addEventListener('click', randomTarget);
    showBtn.addEventListener('click',        toggleShow);
    centerHintBtn.addEventListener('click',  e => { e.stopPropagation(); showHint(); });

    /* ── Init ── */
    buildClock();
    setClockFromMinutes(0);
    setClockFromSeconds(0);
    setSecondsMode(false);
    updateShowBtn();
    randomTarget();
  </script>
</body>
</html>

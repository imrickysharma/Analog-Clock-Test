      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .header-title {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
    }
    .header-title span {
      color: var(--accent);
    }

    /* ── Score strip ── */
    .score-strip {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      background: var(--ink);
      border-radius: 100px;
      padding: 10px 28px;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ffffff;
    }
    .score-value {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: var(--face);
    }
    .score-value.correct { color: #ffffff; }
    .score-value.streak { color: #ffffff; }

    /* ── Challenge card ── */
    .challenge-card {
      background: var(--ink);
      color: var(--face);
      border-radius: 20px;
      padding: 18px 32px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 460px;
      gap: 16px;
    }
    .challenge-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8a8070;
      margin-bottom: 4px;
    }
    .challenge-time {
      font-size: clamp(2.8rem, 11vw, 4.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .challenge-time .colon {
      opacity: 0.5;
    }
    .challenge-time .digit {
      display: inline-block;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
    }
    .challenge-time .digit.flip {
      animation: digitFlip 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes digitFlip {
      0% { transform: translateY(-40%) scale(0.8); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    .challenge-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .pill-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1.5px solid #3a3530;
      background: transparent;
      color: #ffffff;
      border-radius: 100px;
      padding: 7px 16px;
      cursor: pointer;
      min-width: 100px;
      min-height: 36px;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .pill-btn:hover {
      background: #2a2520;
      border-color: #5a5048;
    }
    .pill-btn:active { transform: scale(0.97); }
    .pill-btn.show-active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink);
    }

    /* ── Difficulty pills ── */
    .difficulty-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .diff-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1.5px solid var(--ink);
      background: transparent;
      color: var(--ink);
      border-radius: 100px;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 34px;
    }
    .diff-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--face);
    }
    .diff-btn:not(.active):hover {
      border-color: var(--muted);
      color: var(--ink);
    }

    /* ── Clock ── */
    .clock-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .clock {
      width: var(--cs);
      height: var(--cs);
      border-radius: 50%;
      position: relative;
      background: var(--face);
      user-select: none;
      touch-action: none;
      box-shadow:
        0 0 0 8px var(--bg),
        0 0 0 10px var(--soft),
        0 12px 48px var(--shadow),
        inset 0 1px 3px rgba(255,255,255,0.8);
    }

    /* Outer ring */
    .clock::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 3px solid var(--ink);
      pointer-events: none;
    }

    .number {
      position: absolute;
      width: 30px;
      height: 30px;
      margin-left: -15px;
      margin-top: -15px;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: clamp(0.9rem, 2.3vw, 1.1rem);
      color: var(--ink);
      pointer-events: none;
      z-index: 4;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% calc(var(--cs) * 0.45);
      pointer-events: none;
      z-index: 2;
    }
    .tick.big {
      width: 2.5px;
      height: 14px;
      background: var(--ink);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -1.25px;
    }
    .tick.small {
      width: 1.5px;
      height: 7px;
      background: var(--muted);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -0.75px;
      opacity: 0.6;
    }
    .tick.fifth {
      width: 2px;
      height: 10px;
      background: var(--muted);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -1px;
      opacity: 0.8;
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 999px;
      cursor: grab;
      touch-action: none;
      transition: filter 0.15s;
    }
    .hand:active { cursor: grabbing; }
    .hand:hover { filter: brightness(1.3); }

    .hour-hand {
      width: 9px;
      height: calc(var(--cs) * 0.24);
      background: var(--ink);
      z-index: 6;
      border-radius: 999px 999px 4px 4px;
    }
    .minute-hand {
      width: 5px;
      height: calc(var(--cs) * 0.36);
      background: var(--ink);
      z-index: 7;
      border-radius: 999px 999px 3px 3px;
    }
    .second-hand {
      width: 2px;
      height: calc(var(--cs) * 0.40);
      background: var(--accent);
      z-index: 8;
      display: none;
    }
    /* second hand counterbalance tail */
    .second-hand::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 16px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
    }

    /* Center hint button — invisible but clickable, dot drawn via ::before */
    .center-hint-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      transform: translate(-50%, -50%);
      background: transparent;
      border: none;
      border-radius: 50%;
      color: transparent;
      cursor: default;
      z-index: 12;
      padding: 0;
      box-shadow: none;
    }
    /* The visible ink dot */
    .center-hint-btn::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      transform: translate(-50%, -50%);
      background: var(--ink);
      border-radius: 50%;
      pointer-events: none;
    }
    .center-hint-btn:active {
      transform: translate(-50%, -50%) scale(0.92);
      box-shadow: none;
    }

    /* ── Live time badge ── */
    .current-time-badge {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--face);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      padding: 5px 14px;
      border-radius: 100px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .current-time-badge.visible { opacity: 1; }

    /* ── Hint arc (ghost hand) ── */

    /* ── Bottom controls ── */
    .bottom-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .check-btn {
      font-family: 'Sen', sans-serif;
      font-size: 1.35rem;
      font-weight: 500;
      font-style: normal;
      letter-spacing: 0.02em;
      text-transform: none;
      background: var(--ink);
      color: var(--face);
      border: 2px solid var(--ink);
      border-radius: 100px;
      padding: 14px 36px;
      cursor: pointer;
      min-height: 52px;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 0 #0a0806;
    }
    .check-btn:hover {
      background: #2e2820;
      box-shadow: 0 4px 0 #0a0806, 0 0 0 3px var(--soft);
    }
    .check-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0a0806;
    }
    .check-btn.correct {
      background: #8BD02A;
      border-color: #6ba320;
      box-shadow: 0 4px 0 #6ba320;
      color: var(--ink);
    }
    .check-btn.wrong {
      background: #E70000;
      border-color: #b30000;
      box-shadow: 0 4px 0 #b30000;
    }

    .hint-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--soft);
      border-radius: 100px;
      padding: 14px 20px;
      cursor: pointer;
      min-height: 52px;
      transition: all 0.15s;
    }
    .hint-btn:hover {
      border-color: var(--muted);
      color: var(--ink);
    }
    .hint-btn:active { transform: scale(0.97); }

    /* ── Seconds mode label ── */
    .mode-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mode-label::before,
    .mode-label::after {
      content: '';
      height: 1px;
      width: 40px;
      background: var(--soft);
    }



    /* ── Hint overlay ghost ── */
    .hint-hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .hint-hand.visible { opacity: 0.28; }
    .hint-hour {
      width: 9px;
      height: calc(var(--cs) * 0.24);
      background: var(--accent);
      border-radius: 999px 999px 4px 4px;
    }
    .hint-minute {
      width: 5px;
      height: calc(var(--cs) * 0.36);
      background: var(--accent);
      border-radius: 999px 999px 3px 3px;
    }

    @media (max-width: 420px) {
      :root { --cs: min(86vw, 360px); }
      .check-btn { padding: 12px 28px; }
      .challenge-card { padding: 16px 22px; }
      .score-strip { padding: 9px 20px; gap: 14px; }
    }

    /* Dragging state */
    body.dragging { cursor: grabbing !important; }
    body.dragging * { cursor: grabbing !important; }
  </style>
</head>
<body>
  <main class="app">

    <!-- Score strip -->
    <div class="score-strip">
      <div class="score-item">
        <span class="score-label">Score</span>
        <span class="score-value correct" id="scoreCorrect">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Streak</span>
        <span class="score-value streak" id="scoreStreak">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Best</span>
        <span class="score-value" id="scoreBest">0</span>
      </div>
    </div>

    <!-- Difficulty -->
    <div class="difficulty-row">
      <button class="diff-btn active" data-diff="easy" type="button">Easy</button>
      <button class="diff-btn" data-diff="medium" type="button">Medium</button>
      <button class="diff-btn" data-diff="hard" type="button">Hard</button>
      <button class="diff-btn" data-diff="seconds" type="button">Seconds</button>
    </div>

    <!-- Challenge card -->
    <div class="challenge-card">
      <div>
        <div class="challenge-time" id="challengeTime">
          <span class="digit" id="cH1">1</span><span class="digit" id="cH2">2</span><span class="colon">:</span><span class="digit" id="cM1">0</span><span class="digit" id="cM2">0</span><span id="cSecWrap"><span class="colon" id="cSecColon">:</span><span class="digit" id="cS1">0</span><span class="digit" id="cS2">0</span></span>
        </div>
      </div>
      <div class="challenge-actions">
        <button class="pill-btn" id="newTimeBtn" type="button">New time</button>
        <button class="pill-btn" id="showBtn" type="button">Show me</button>
      </div>
    </div>

    <!-- Clock face -->
    <div class="clock-wrap">
      <section class="clock" id="clock" aria-label="Interactive analog clock">
        <button class="center-hint-btn" id="centerHintBtn" type="button" aria-label="Show hint">?</button>
      </section>
      <div class="current-time-badge" id="currentTimeBadge">12:00</div>
    </div>

    <!-- Bottom controls -->
    <div class="bottom-controls">
      <button class="check-btn" id="checkBtn" type="button">Check Answer</button>
    </div>



  </main>



  <script>
    // Remove accidental pasted text nodes (e.g., ```html / ```) that can shift layout.
    Array.from(document.body.childNodes).forEach(node => {
      if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) node.remove();
    });

    /* ── Constants & state ── */
    const DIFFICULTIES = {
      easy:    { minutes: true,  seconds: false, minuteStep: 5  },
      medium:  { minutes: true,  seconds: false, minuteStep: 1  },
      hard:    { minutes: true,  seconds: false, minuteStep: 1  },
      seconds: { minutes: true,  seconds: true,  minuteStep: 1  },
    };

    let diff = 'easy';
    let targetHour = 12, targetMinute = 0, targetSecond = 0;
    let currentMinutes = 0, currentSeconds = 0;
    let dragMode = null;
    let prevAngle = 0;
    let isSecondsMode = false;
    let isShowActive = false;
    let score = 0, streak = 0, bestStreak = 0;
    let checkTimer = null, hintTimer = null;

    /* ── DOM refs ── */
    const clockEl        = document.getElementById('clock');
    const checkBtn       = document.getElementById('checkBtn');
    const showBtn        = document.getElementById('showBtn');
    const newTimeBtn     = document.getElementById('newTimeBtn');
    const centerHintBtn  = document.getElementById('centerHintBtn');
    const badge          = document.getElementById('currentTimeBadge');

    const scoreCorrectEl = document.getElementById('scoreCorrect');
    const scoreStreakEl  = document.getElementById('scoreStreak');
    const scoreBestEl    = document.getElementById('scoreBest');

    /* ── Build clock face ── */
    const hourHand   = document.createElement('div');
    const minuteHand = document.createElement('div');
    const secondHand = document.createElement('div');
    const hintHour   = document.createElement('div');
    const hintMinute = document.createElement('div');

    hourHand.className   = 'hand hour-hand';
    minuteHand.className = 'hand minute-hand';
    secondHand.className = 'hand second-hand';
    hintHour.className   = 'hint-hand hint-hour';
    hintMinute.className = 'hint-hand hint-minute';

    function buildClock() {
      for (let i = 0; i < 60; i++) {
        const tick = document.createElement('div');
        if (i % 5 === 0) tick.className = 'tick big';
        else if (i % 5 !== 0 && i % 5 !== 0) tick.className = 'tick small';
        else tick.className = 'tick fifth';
        tick.style.transform = `rotate(${i * 6}deg)`;
        clockEl.appendChild(tick);
      }
      const r = 37;
      for (let n = 1; n <= 12; n++) {
        const angle = (n / 12) * Math.PI * 2;
        const el = document.createElement('div');
        el.className = 'number';
        el.textContent = n;
        el.style.left = `${50 + r * Math.sin(angle)}%`;
        el.style.top  = `${50 - r * Math.cos(angle)}%`;
        clockEl.appendChild(el);
      }
      clockEl.appendChild(hintHour);
      clockEl.appendChild(hintMinute);
      clockEl.appendChild(hourHand);
      clockEl.appendChild(minuteHand);
      clockEl.appendChild(secondHand);
    }

    /* ── Angle helpers ── */
    function normAngle(a) { return ((a % 360) + 360) % 360; }
    function shortDelta(prev, next) {
      let d = normAngle(next) - normAngle(prev);
      if (d > 180)  d -= 360;
      if (d < -180) d += 360;
      return d;
    }

    function setClockFromMinutes(m) {
      currentMinutes = ((m % 720) + 720) % 720;
      const hA = currentMinutes * 0.5;
      const mA = (currentMinutes % 60) * 6;
      hourHand.style.transform   = `translate(-50%, -100%) rotate(${hA}deg)`;
      minuteHand.style.transform = `translate(-50%, -100%) rotate(${mA}deg)`;
    }

    function setClockFromSeconds(s) {
      currentSeconds = ((s % 60) + 60) % 60;
      const sA = currentSeconds * 6;
      secondHand.style.transform = `translate(-50%, -100%) rotate(${sA}deg)`;
    }

    /* ── Pointer helpers ── */
    function getPoint(e) {
      if (e.touches?.length)        return { x: e.touches[0].clientX,        y: e.touches[0].clientY };
      if (e.changedTouches?.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function pointerAngle(clientX, clientY) {
      const r = clockEl.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      return normAngle(Math.atan2(clientX - cx, -(clientY - cy)) * (180 / Math.PI));
    }

    /* ── Drag logic ── */
    function onMove(e) {
      if (!dragMode) return;
      e.preventDefault();
      const { x, y } = getPoint(e);
      const angle = pointerAngle(x, y);
      const delta = shortDelta(prevAngle, angle);
      prevAngle = angle;

      if (dragMode === 'minute') {
        currentMinutes += delta / 6;
        setClockFromMinutes(currentMinutes);
      } else if (dragMode === 'hour') {
        currentMinutes += delta * 2;
        setClockFromMinutes(currentMinutes);
      } else if (dragMode === 'second') {
        currentSeconds += delta / 6;
        setClockFromSeconds(currentSeconds);
      }
      updateBadge();
      if (isShowActive) updateShowBtn();
    }

    function endDrag() {
      dragMode = null;
      document.body.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('mouseup', endDrag);
      window.removeEventListener('touchend', endDrag);
      window.removeEventListener('touchcancel', endDrag);
    }

    function startDrag(type, e) {
      dragMode = type;
      e.preventDefault();
      document.body.classList.add('dragging');
      const { x, y } = getPoint(e);
      prevAngle = pointerAngle(x, y);
      window.addEventListener('mousemove', onMove, { passive: false });
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', endDrag);
      window.addEventListener('touchend', endDrag);
      window.addEventListener('touchcancel', endDrag);
    }

    /* ── Current time reading ── */
    function getClockParts() {
      const mw = ((currentMinutes % 720) + 720) % 720;
      const sw = ((Math.round(currentSeconds) % 60) + 60) % 60;
      const rm = Math.round(mw) % 720;
      return {
        hour12: Math.floor(rm / 60) % 12 || 12,
        minute:  rm % 60,
        second:  sw,
      };
    }

    function fmt(h, m, s, secs) {
      const base = `${h}:${String(m).padStart(2,'0')}`;
      return secs ? `${base}:${String(s).padStart(2,'0')}` : base;
    }

    /* ── Badge ── */
    function updateBadge() {
      const { hour12, minute, second } = getClockParts();
      badge.textContent = fmt(hour12, minute, second, isSecondsMode);
      badge.classList.add('visible');
    }

    /* ── Target time display ── */
    const digitEls = {
      H1: document.getElementById('cH1'),
      H2: document.getElementById('cH2'),
      M1: document.getElementById('cM1'),
      M2: document.getElementById('cM2'),
      S1: document.getElementById('cS1'),
      S2: document.getElementById('cS2'),
      secWrap: document.getElementById('cSecWrap'),
    };

    function setDigit(el, newVal) {
      if (el.textContent === newVal) return;
      el.textContent = newVal;
      el.classList.remove('flip');
      void el.offsetWidth;
      el.classList.add('flip');
    }

    function updateTargetDisplay() {
      const hs = String(targetHour);
      const ms = String(targetMinute).padStart(2,'0');
      const ss = String(targetSecond).padStart(2,'0');
      setDigit(digitEls.H1, hs.length === 1 ? '\u2009' : hs[0]);
      setDigit(digitEls.H2, hs.length === 1 ? hs[0] : hs[1]);
      setDigit(digitEls.M1, ms[0]);
      setDigit(digitEls.M2, ms[1]);
      setDigit(digitEls.S1, ss[0]);
      setDigit(digitEls.S2, ss[1]);
      digitEls.secWrap.style.display = isSecondsMode ? '' : 'none';
    }

    /* ── Random target ── */
    function randomTarget() {
      const cfg = DIFFICULTIES[diff];
      targetHour   = Math.floor(Math.random() * 12) + 1;
      targetSecond = isSecondsMode ? Math.floor(Math.random() * 60) : 0;

      if (diff === 'easy') {
        targetMinute = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55][Math.floor(Math.random() * 12)];
      } else if (diff === 'medium') {
        targetMinute = Math.floor(Math.random() * 12) * 5;
      } else {
        targetMinute = Math.floor(Math.random() * 60);
      }

      updateTargetDisplay();
      hideHint();
      checkBtn.classList.remove('correct', 'wrong');
      checkBtn.textContent = 'Check Answer';

      if (isShowActive) {
        isShowActive = false;
        showBtn.classList.remove('show-active');
        badge.classList.remove('visible');
      }
    }

    /* ── Show button ── */
    function updateShowBtn() {
      // badge already shows current time; button stays as label only
    }

    function toggleShow() {
      isShowActive = !isShowActive;
      showBtn.classList.toggle('show-active', isShowActive);
      if (!isShowActive) {
        badge.classList.remove('visible');
      } else {
        updateBadge();
      }
    }

    /* ── Hint ghost hands ── */
    function showHint() {
      const totalM = targetHour * 60 + targetMinute;
      const hA = totalM * 0.5;
      const mA = targetMinute * 6;
      hintHour.style.transform   = `translate(-50%, -100%) rotate(${hA}deg)`;
      hintMinute.style.transform = `translate(-50%, -100%) rotate(${mA}deg)`;
      hintHour.classList.add('visible');
      hintMinute.classList.add('visible');
      if (hintTimer) clearTimeout(hintTimer);
      hintTimer = setTimeout(hideHint, 3000);
    }
    function hideHint() {
      hintHour.classList.remove('visible');
      hintMinute.classList.remove('visible');
    }

    function checkAnswer() {
      const { hour12, minute, second } = getClockParts();
      const hOk = hour12 === targetHour;
      const mOk = minute  === targetMinute;
      const sOk = !isSecondsMode || second === targetSecond;
      const correct = hOk && mOk && sOk;

      checkBtn.classList.remove('correct', 'wrong');
      checkBtn.classList.add(correct ? 'correct' : 'wrong');
      checkBtn.textContent = correct ? 'Correct' : 'Try Again';

      if (correct) {
        score++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        updateBadge();
        setTimeout(() => randomTarget(), 1400);
      } else {
        streak = 0;
        setTimeout(() => {
          checkBtn.classList.remove('correct', 'wrong');
          checkBtn.textContent = 'Check Answer';
        }, 1200);
      }

      scoreCorrectEl.textContent = score;
      scoreStreakEl.textContent  = streak;
      scoreBestEl.textContent    = bestStreak;
    }

    /* ── Seconds mode ── */
    function toggleSeconds() {
      isSecondsMode = !isSecondsMode;
      secondHand.style.display = isSecondsMode ? 'block' : 'none';
      updateTargetDisplay();
    }

    /* ── Difficulty ── */
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        diff = btn.dataset.diff;
        const secsMode = diff === 'seconds';
        if (secsMode !== isSecondsMode) toggleSeconds();
        randomTarget();
      });
    });

    /* ── Events ── */
    hourHand.addEventListener('mousedown',   e => startDrag('hour', e));
    hourHand.addEventListener('touchstart',  e => startDrag('hour', e), { passive: false });
    minuteHand.addEventListener('mousedown', e => startDrag('minute', e));
    minuteHand.addEventListener('touchstart',e => startDrag('minute', e), { passive: false });
    secondHand.addEventListener('mousedown', e => startDrag('second', e));
    secondHand.addEventListener('touchstart',e => startDrag('second', e), { passive: false });

    checkBtn.addEventListener('click',       checkAnswer);
    showBtn.addEventListener('click',        toggleShow);
    newTimeBtn.addEventListener('click',     randomTarget);
    centerHintBtn.addEventListener('click',  e => { e.stopPropagation(); showHint(); });

    /* ── Init ── */
    buildClock();
    setClockFromMinutes(0);
    setClockFromSeconds(0);
    randomTarget();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Clock Academy</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#f5f0e8" />
  <meta name="apple-mobile-web-app-title" content="Clock Academy" />
  <meta name="application-name" content="Clock Academy" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon-precomposed" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="shortcut icon" href="icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Mono:wght@400;500&family=Jura:wght@300;400&family=Sen:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cs: min(78vw, 400px);
      --bg: #f5f0e8;
      --ink: #1a1612;
      --accent: #c84b2f;
      --gold: #FD5B04;
      --face: #fffef9;
      --soft: #e8e0d0;
      --muted: #9a8f80;
      --correct: #2d7a4f;
      --wrong: #c84b2f;
      --shadow: rgba(26,22,18,0.15);
      --page-bg: #f5f0e8;
      --page-text: #1a1612;
      --page-muted: #9a8f80;
      --panel-bg: #1a1612;
      --panel-fg: #fffef9;
      --surface-bg: #fffef9;
      --surface-ring: #e8e0d0;
      --surface-shadow: rgba(26,22,18,0.15);
      --line: #1a1612;
      --subline: #9a8f80;
      --gloss-shell-bg:
        linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.03) 18%, rgba(0,0,0,0.08) 100%),
        linear-gradient(180deg, rgba(42,36,31,0.96) 0%, rgba(24,20,16,0.98) 100%);
      --gloss-shell-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(0,0,0,0.36),
        0 16px 28px rgba(26,22,18,0.14);
      --gloss-sheen: linear-gradient(120deg, rgba(255,255,255,0.16), rgba(255,255,255,0) 34%);
      --gloss-active-bg:
        linear-gradient(180deg, rgba(255,255,255,0.94) 0%, rgba(247,241,232,0.98) 100%);
      --gloss-active-shadow:
        inset 0 1px 0 rgba(255,255,255,0.98),
        inset 0 -1px 0 rgba(194,183,168,0.42),
        0 8px 18px rgba(26,22,18,0.12);
      --gloss-active-text: #14110e;
      --texture-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a1612' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    :root[data-theme-resolved="dark"] {
      --bg: #110f0d;
      --face: #16120f;
      --soft: #2a231c;
      --muted: #a59686;
      --shadow: rgba(0,0,0,0.52);
      --page-bg: #110f0d;
      --page-text: #f4ede3;
      --page-muted: #a59686;
      --panel-bg: #211b16;
      --panel-fg: #fff9f0;
      --surface-bg: #16120f;
      --surface-ring: #2a231c;
      --surface-shadow: rgba(0,0,0,0.52);
      --line: #f4ede3;
      --subline: #a59686;
      --gloss-shell-bg:
        linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 16%, rgba(0,0,0,0.16) 100%),
        linear-gradient(180deg, rgba(37,31,27,0.98) 0%, rgba(18,15,12,0.98) 100%);
      --gloss-shell-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        inset 0 -1px 0 rgba(0,0,0,0.48),
        0 16px 30px rgba(0,0,0,0.28);
      --gloss-sheen: linear-gradient(120deg, rgba(255,255,255,0.12), rgba(255,255,255,0) 34%);
      --gloss-active-bg:
        linear-gradient(180deg, rgba(255,255,255,0.97) 0%, rgba(245,236,224,0.98) 100%);
      --gloss-active-shadow:
        inset 0 1px 0 rgba(255,255,255,1),
        inset 0 -1px 0 rgba(192,180,163,0.45),
        0 10px 22px rgba(0,0,0,0.24);
      --gloss-active-text: #110e0b;
      --texture-image: none;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      min-height: 100svh;
      height: 100svh;
      font-family: 'Fraunces', Georgia, serif;
      background: var(--page-bg);
      color: var(--page-text);
      position: fixed;
      inset: 0;
      padding:
        calc(env(safe-area-inset-top, 0px) + 20px)
        calc(env(safe-area-inset-right, 0px) + 20px)
        calc(env(safe-area-inset-bottom, 0px) + 20px)
        calc(env(safe-area-inset-left, 0px) + 20px);
      overflow: hidden;
      transition: background 0.2s ease, color 0.2s ease;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: var(--texture-image);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100%, 560px);
      margin-left: auto;
      margin-right: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .top-row {
      position: relative;
      width: min(100%, 460px);
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-topbar {
      position: absolute;
      top: 2px;
      left: 0;
      z-index: 20;
    }
    .utility-menu {
      position: relative;
    }
    .utility-trigger {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 999px;
      background: transparent;
      box-shadow: none;
      color: var(--page-text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      position: relative;
    }
    .utility-trigger:hover {
      transform: translateY(-1px);
      opacity: 0.86;
    }
    .utility-trigger::before {
      content: none;
    }
    .utility-trigger::after {
      content: none;
    }
    .utility-trigger svg {
      width: 22px;
      height: 22px;
      position: relative;
      z-index: 1;
    }
    .utility-trigger .trigger-icon {
      display: none;
    }
    .utility-trigger .trigger-icon-light,
    .utility-trigger .trigger-icon-system {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .utility-trigger .trigger-icon-dark {
      fill: currentColor;
      stroke: none;
    }
    .utility-trigger[data-theme-icon="light"] .trigger-icon-light,
    .utility-trigger[data-theme-icon="dark"] .trigger-icon-dark,
    .utility-trigger[data-theme-icon="system"] .trigger-icon-system {
      display: block;
    }
    :root[data-theme-resolved="dark"] .utility-trigger {
      color: #fff8ef;
    }
    .utility-panel {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      min-width: 188px;
      padding: 10px;
      border-radius: 18px;
      background: var(--gloss-shell-bg);
      border: 1px solid rgba(26,22,18,0.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(0,0,0,0.32),
        0 18px 40px rgba(26,22,18,0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px) scale(0.98);
      transition: opacity 0.18s ease, transform 0.18s ease;
      overflow: hidden;
    }
    .utility-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gloss-sheen);
      pointer-events: none;
    }
    .utility-menu.open .utility-panel {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }
    .utility-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--page-muted);
      padding: 2px 4px 8px;
    }

    .onboarding {
      position: fixed;
      inset: 0;
      z-index: 60;
      padding: 20px;
      background: rgba(235, 228, 215, 0.36);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .onboarding.open {
      opacity: 1;
      pointer-events: auto;
    }
    :root[data-theme-resolved="dark"] .onboarding {
      background: rgba(10, 8, 7, 0.22);
    }
    .onboarding-stage {
      position: relative;
      width: min(100%, 560px);
      height: calc(100svh - 40px);
      margin: 0 auto;
    }
    .onboarding-note {
      position: absolute;
      max-width: 132px;
      background: rgba(255, 252, 247, 0.94);
      border: 1px solid rgba(26,22,18,0.08);
      border-radius: 16px;
      padding: 8px 10px;
      box-shadow: 0 10px 20px rgba(26,22,18,0.08);
      pointer-events: none;
    }
    :root[data-theme-resolved="dark"] .onboarding-note {
      background: rgba(34, 29, 24, 0.94);
      border-color: rgba(255,249,240,0.08);
      box-shadow: 0 10px 20px rgba(0,0,0,0.24);
    }
    .onboarding-note::after {
      content: none;
    }
    .onboarding-note strong {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Sen', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.15;
      color: var(--page-text);
      margin-bottom: 0;
    }
    .onboarding-index {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      color: var(--face);
      font-family: 'DM Mono', monospace;
      font-size: 0.56rem;
      flex-shrink: 0;
    }
    .onboarding-note.theme-note {
      top: 28px;
      left: 18px;
    }
    .onboarding-note.theme-note::after {
      left: 28px;
      top: -18px;
      transform: rotate(-90deg);
      transform-origin: center;
    }
    .onboarding-note.level-note {
      top: 24px;
      right: 8px;
    }
    .onboarding-note.level-note::after {
      left: 22px;
      top: 100%;
      transform: rotate(-68deg);
      transform-origin: right center;
    }
    .onboarding-note.time-note {
      top: 138px;
      left: 68px;
    }
    .onboarding-note.time-note::after {
      right: -34px;
      top: 16px;
      transform: rotate(0deg);
      transform-origin: left center;
    }
    .onboarding-note.show-note {
      top: 232px;
      right: -6px;
    }
    .onboarding-note.show-note::after {
      left: -34px;
      top: 16px;
      transform: rotate(180deg);
      transform-origin: right center;
    }
    .onboarding-note.clock-note {
      top: 320px;
      left: -4px;
      max-width: 128px;
    }
    .onboarding-note.clock-note::after {
      right: 18px;
      top: -18px;
      transform: rotate(-64deg);
      transform-origin: center;
    }
    .onboarding-note.check-note {
      bottom: -14px;
      right: 60px;
    }
    .onboarding-note.check-note::after {
      left: -22px;
      top: 14px;
      transform: rotate(180deg);
      transform-origin: right center;
    }
    .onboarding-bar {
      position: absolute;
      left: 90px;
      bottom: 54px;
      transform: none;
      display: flex;
      align-items: center;
      pointer-events: none;
    }
    .onboarding-close {
      border: none;
      border-radius: 999px;
      background: var(--ink);
      color: var(--face);
      padding: 11px 18px;
      min-height: 40px;
      font-family: 'Sen', sans-serif;
      font-size: 0.94rem;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(26,22,18,0.16);
      pointer-events: none;
    }
    .onboarding.open .onboarding-note,
    .onboarding.open .onboarding-bar,
    .onboarding.open .onboarding-close {
      pointer-events: auto;
    }
    @media (max-width: 640px) {
      .onboarding-stage {
        height: calc(100svh - 40px);
      }
      .onboarding-note {
        max-width: 108px;
        padding: 7px 8px;
      }
      .onboarding-note strong {
        font-size: 0.68rem;
      }
      .onboarding-note span {
        font-size: 0.58rem;
      }
      .onboarding-index {
        width: 16px;
        height: 16px;
        font-size: 0.5rem;
      }
      .onboarding-note.theme-note {
        top: 24px;
        left: 8px;
      }
      .onboarding-note.theme-note::after {
        left: 22px;
        top: -18px;
        transform: rotate(-90deg);
      }
      .onboarding-note.level-note {
        top: 26px;
        right: -4px;
      }
      .onboarding-note.level-note::after {
        left: 12px;
        top: 100%;
        transform: rotate(-68deg);
      }
      .onboarding-note.time-note {
        top: 136px;
        left: 50px;
      }
      .onboarding-note.time-note::after {
        right: -30px;
        top: 14px;
        transform: rotate(0deg);
      }
      .onboarding-note.show-note {
        top: 216px;
        right: 0;
      }
      .onboarding-note.show-note::after {
        left: -30px;
        top: 14px;
        transform: rotate(180deg);
      }
      .onboarding-note.clock-note {
        top: 304px;
        left: -6px;
        max-width: 112px;
      }
      .onboarding-note.clock-note::after {
        right: 12px;
        top: -18px;
        transform: rotate(-66deg);
      }
      .onboarding-note.check-note {
        bottom: -10px;
        right: 34px;
      }
      .onboarding-note.check-note::after {
        left: -20px;
        top: 14px;
        transform: rotate(180deg);
      }
      .onboarding-bar {
        left: 64px;
        bottom: 52px;
      }
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--page-muted);
      margin-bottom: 6px;
    }
    .header-title {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--page-text);
    }
    .header-title span {
      color: var(--accent);
    }

    /* ── Score strip ── */
    .score-strip {
      display: flex;
      gap: 20px;
      margin-bottom: 0;
      background: var(--gloss-shell-bg);
      border-radius: 100px;
      padding: 10px 28px;
      box-shadow: var(--gloss-shell-shadow);
      position: relative;
      overflow: hidden;
    }
    .score-strip::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gloss-sheen);
      pointer-events: none;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .score-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,249,240,0.74);
    }
    .score-value {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: var(--panel-fg);
    }
    .score-value.correct { color: #ffffff; }
    .score-value.streak { color: #ffffff; }

    /* ── Difficulty Bar ── */
    .difficulty-bar {
      position: relative;
      width: min(100%, 460px);
      margin-bottom: 24px;
      padding: 3px;
      border-radius: 999px;
      background: var(--gloss-shell-bg);
      box-shadow: var(--gloss-shell-shadow);
      overflow: hidden;
      isolation: isolate;
    }
    .difficulty-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gloss-sheen);
      pointer-events: none;
      z-index: 0;
    }
    .difficulty-indicator {
      position: absolute;
      top: 3px;
      bottom: 3px;
      left: 3px;
      width: calc((100% - 6px) / 3);
      border-radius: 999px;
      background: var(--gloss-active-bg);
      box-shadow: var(--gloss-active-shadow);
      transform: translateX(calc(var(--difficulty-index, 0) * 100%));
      transition: transform 0.34s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease, box-shadow 0.2s ease;
      z-index: 1;
      pointer-events: none;
    }
    .difficulty-track {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      align-items: stretch;
      cursor: pointer;
    }
    .difficulty-btn {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      background: transparent;
      min-height: 40px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: rgba(255,249,240,0.62);
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s ease, transform 0.12s ease;
      position: relative;
      z-index: 3;
    }
    .difficulty-btn:active {
      transform: scale(0.985);
    }
    .difficulty-btn:not(.active):hover {
      color: rgba(255,249,240,0.84);
    }
    .difficulty-btn.active {
      color: var(--gloss-active-text);
      text-shadow: none;
    }
    :root[data-theme-resolved="dark"] .difficulty-btn {
      color: rgba(255,249,240,0.62);
    }
    :root[data-theme-resolved="dark"] .difficulty-btn:not(.active):hover {
      color: rgba(255,249,240,0.84);
    }
    .difficulty-btn-label {
      pointer-events: none;
      color: inherit;
      opacity: 1;
      transition: color 0.2s ease, opacity 0.2s ease;
    }
    .difficulty-btn.active .difficulty-btn-label {
      color: var(--gloss-active-text);
    }
    .difficulty-btn:not(.active) .difficulty-btn-label {
      color: rgba(255,249,240,0.62);
    }
    .difficulty-btn:not(.active):hover .difficulty-btn-label {
      color: rgba(255,249,240,0.84);
    }
    .difficulty-bar,
    .difficulty-bar *,
    .difficulty-track,
    .difficulty-track *,
    .difficulty-btn,
    .difficulty-btn * {
      cursor: pointer;
    }

    /* ── Challenge card ── */
    .challenge-card {
      background: var(--gloss-shell-bg);
      color: var(--panel-fg);
      border-radius: 20px;
      padding: 0 0 0 20px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 460px;
      min-height: 114px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 108px;
      align-items: center;
      overflow: hidden;
      box-shadow: var(--gloss-shell-shadow);
      position: relative;
    }
    .challenge-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gloss-sheen);
      pointer-events: none;
      z-index: 0;
    }
    .challenge-display {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 18px 26px 18px 8px;
      position: relative;
      z-index: 1;
    }
    .challenge-time {
      -webkit-appearance: none;
      appearance: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Jura', sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      max-width: 100%;
      font-size: 4.2rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      cursor: pointer;
      background: transparent;
      border: none;
      color: inherit;
      padding: 0;
      text-align: center;
      white-space: nowrap;
      caret-color: transparent;
    }
    #targetTimeText {
      display: inline-block;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      font-family: inherit;
      font-size: 1em;
      font-weight: inherit;
      letter-spacing: inherit;
      line-height: 1;
    }
    .challenge-time.seconds-mode {

    .show-btn-label {

    }
    .pill-btn.show-active .show-value {

    .pill-btn.show-active .show-btn-label {
      opacity: 0;
      transform: translateY(10px);
    }
    .pill-btn.show-active .show-fill {
      transform: translateY(0);
      opacity: 1;
    }

    .theme-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255,249,240,0.72);
      border-radius: 14px;
      padding: 10px 12px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, box-shadow 0.15s, border-color 0.15s;
      min-height: 46px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-btn.active {
      background: var(--gloss-active-bg);
      border-color: rgba(255,255,255,0.24);
      color: var(--gloss-active-text);
      box-shadow: var(--gloss-active-shadow);
    }
    .theme-btn:not(.active):hover {
      border-color: rgba(255,249,240,0.12);
      color: rgba(255,249,240,0.92);
      background: rgba(255,255,255,0.03);
    }
    .theme-btn {
      width: 100%;
      justify-content: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
    }
    .theme-icon {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: currentColor;
      position: relative;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.04) 16%, rgba(0,0,0,0.12) 100%),
        linear-gradient(180deg, rgba(54,47,41,0.96) 0%, rgba(28,24,20,0.98) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(0,0,0,0.28),
        0 6px 14px rgba(26,22,18,0.14);
      overflow: hidden;
    }
    .theme-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gloss-sheen);
      pointer-events: none;
    }
    .theme-icon svg {
      width: 18px;
      height: 18px;
      position: relative;
      z-index: 1;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .theme-btn.active .theme-icon {
      background: var(--gloss-active-bg);
      box-shadow: var(--gloss-active-shadow);
    }

    /* ── Clock ── */
    .clock-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .clock {
      width: var(--cs);
      height: var(--cs);
      border-radius: 50%;
      position: relative;
      background: var(--surface-bg);
      user-select: none;
      touch-action: none;
      box-shadow:
        0 0 0 8px var(--page-bg),
        0 0 0 10px var(--surface-ring),
        0 12px 48px var(--surface-shadow),
        inset 0 1px 3px rgba(255,255,255,0.8);
    }

    /* Outer ring */
    .clock::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 3px solid var(--line);
      pointer-events: none;
    }


    .number {
      position: absolute;
      width: 30px;
      height: 30px;
      margin-left: -15px;
      margin-top: -15px;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: clamp(0.9rem, 2.3vw, 1.1rem);
      color: var(--line);
      pointer-events: none;
      z-index: 4;
    }

    .second-label {
      position: absolute;
      width: 18px;
      height: 18px;
      margin-left: -9px;
      margin-top: -9px;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.38rem, 1vw, 0.56rem);
      font-weight: 500;
      line-height: 1;
      color: var(--line);
      opacity: 0.78;
      pointer-events: none;
      z-index: 3;
      font-variant-numeric: tabular-nums;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% calc(var(--cs) * 0.45);
      pointer-events: none;
      z-index: 2;
    }
    .tick.big {
      width: 2.5px;
      height: 14px;
      background: var(--line);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -1.25px;
    }
    .tick.small {
      width: 1.5px;
      height: 7px;
      background: var(--subline);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -0.75px;
      opacity: 0.6;
    }
    .tick.fifth {
      width: 2px;
      height: 10px;
      background: var(--subline);
      margin-top: calc(var(--cs) * -0.45);
      margin-left: -1px;
      opacity: 0.8;
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      transform-origin: 50% 100%;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 999px;
      cursor: grab;
      touch-action: none;
      will-change: transform;
      backface-visibility: hidden;
      transition: filter 0.15s;
    }
    .hand::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -34px;
      width: 64px;
      height: calc(100% + 56px);
      transform: translateX(-50%);
      background: transparent;
    }
    .hour-hand::before {
      width: 72px;
    }
    .minute-hand::before {
      width: 66px;
    }
    .second-hand::before {
      width: 54px;
      top: -38px;
      height: calc(100% + 62px);
    }
    .hand.dragging {
      transition: none;
      filter: none;
    }
    .hand:active { cursor: grabbing; }
    .hand:hover { filter: brightness(1.3); }

    .hour-hand {
      width: 9px;
      height: calc(var(--cs) * 0.24);
      background: var(--line);
      z-index: 6;
      border-radius: 999px 999px 4px 4px;
    }
    .minute-hand {
      width: 5px;
      height: calc(var(--cs) * 0.36);
      background: var(--line);
      z-index: 7;
      border-radius: 999px 999px 3px 3px;
    }
    .second-hand {
      width: 2px;
      height: calc(var(--cs) * 0.40);
      background: var(--accent);
      z-index: 8;
      display: none;
    }
    /* second hand counterbalance tail */
    .second-hand::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 16px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
    }

    /* Center hint button — invisible but clickable, dot drawn via ::before */
    .center-hint-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      transform: translate(-50%, -50%);
      background: transparent;
      border: none;
      border-radius: 50%;
      color: transparent;
      cursor: default;
      z-index: 12;
      padding: 0;
      box-shadow: none;
    }
    /* The visible ink dot */
    .center-hint-btn::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      transform: translate(-50%, -50%);
      background: var(--line);
      border-radius: 50%;
      pointer-events: none;
    }
    .center-hint-btn:active {
      transform: translate(-50%, -50%) scale(0.92);
      box-shadow: none;
    }

    /* ── Hint arc (ghost hand) ── */

    /* ── Bottom controls ── */
    .bottom-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .check-btn {
      font-family: 'Sen', sans-serif;
      font-size: 1.35rem;
      font-weight: 500;
      font-style: normal;
      letter-spacing: 0.02em;
      text-transform: none;
      background: var(--gloss-shell-bg);
      color: var(--panel-fg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 100px;
      padding: 14px 36px;
      cursor: pointer;
      min-height: 52px;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(0,0,0,0.36),
        0 10px 20px rgba(26,22,18,0.16);
    }
    .check-btn:hover {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        inset 0 -1px 0 rgba(0,0,0,0.38),
        0 12px 24px rgba(26,22,18,0.2);
    }
    .check-btn:active {
      transform: translateY(1px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.32),
        0 6px 12px rgba(26,22,18,0.16);
    }
    .check-btn.correct {
      background: #06C60A;
      border-color: #049a08;
      box-shadow: 0 4px 0 #049a08;
      color: var(--page-text);
    }
    .check-btn.wrong {
      background:
        linear-gradient(180deg, #ff4a4a 0%, #FF1A1A 48%, #d80f0f 100%);
      border-color: #c70d0d;
      box-shadow: 0 4px 0 #b30c0c;
    }

    .hint-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: var(--page-muted);
      border: 1.5px solid var(--surface-ring);
      border-radius: 100px;
      padding: 14px 20px;
      cursor: pointer;
      min-height: 52px;
      transition: all 0.15s;
    }
    .hint-btn:hover {
      border-color: var(--page-muted);
      color: var(--page-text);
    }
    .hint-btn:active { transform: scale(0.97); }

    /* ── Seconds mode label ── */
    .mode-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--page-muted);
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mode-label::before,
    .mode-label::after {
      content: '';
      height: 1px;
      width: 40px;
      background: var(--surface-ring);
    }



    /* ── Hint overlay ghost ── */
    .hint-hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .hint-hand.visible { opacity: 0.28; }
    .hint-hour {
      width: 9px;
      height: calc(var(--cs) * 0.24);
      background: var(--accent);
      border-radius: 999px 999px 4px 4px;
    }
    .hint-minute {
      width: 5px;
      height: calc(var(--cs) * 0.36);
      background: var(--accent);
      border-radius: 999px 999px 3px 3px;
    }

    @media (max-width: 420px) {
      :root { --cs: min(86vw, 360px); }
      .top-row {
        width: 100%;
        margin-bottom: 22px;
      }
      .app-topbar {
        top: 2px;
      }
      .utility-trigger {
        width: 28px;
        height: 28px;
      }
      .utility-panel {
        min-width: 176px;
      }
      .check-btn { padding: 12px 28px; }
      .challenge-card { padding: 16px 22px; }
      .score-strip { padding: 9px 20px; gap: 14px; }
    }

    /* Dragging state */
    body.dragging { cursor: grabbing !important; }
    body.dragging * { cursor: grabbing !important; }
  </style>
</head>
<body>
  <div class="onboarding" id="onboarding" aria-hidden="true">

  <script>
    // Remove accidental pasted text nodes (e.g., ```html / ```) that can shift layout.
    Array.from(document.body.childNodes).forEach(node => {
      if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) node.remove();
    });

    // Prevent double-tap zoom and pinch zoom shifting on iPhone Safari.
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (event) => {
      const now = Date.now();
      const interactiveTarget = event.target instanceof Element
        && event.target.closest('button, a, input, select, textarea, label, summary, [role="button"]');
      if (!interactiveTarget && now - lastTouchEnd < 300) event.preventDefault();
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('gesturestart', (event) => {
      event.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturechange', (event) => {
      event.preventDefault();
    }, { passive: false });

    const THEME_STORAGE_KEY = 'clock-academy-theme-mode';
    const ONBOARDING_STORAGE_KEY = 'clock-academy-onboarding-seen';
    const themeQuery = window.matchMedia('(prefers-color-scheme: dark)');
    const themeColorMeta = document.querySelector('meta[name="theme-color"]');
    function resolveTheme(mode) {
      if (mode === 'system') return themeQuery.matches ? 'dark' : 'light';
      return mode;
    }

    function updateThemeButtons(mode) {
      document.querySelectorAll('.theme-btn').forEach((button) => {
        button.classList.toggle('active', button.dataset.themeMode === mode);
      });
    }

    function setUtilityMenu(open) {
      utilityMenu.classList.toggle('open', open);
      utilityTrigger.setAttribute('aria-expanded', String(open));
    }

    function updateUtilityTriggerIcon(mode) {
      utilityTrigger.dataset.themeIcon = mode;
      utilityTrigger.setAttribute('aria-label', `Open ${mode} theme options`);
    }

    function applyTheme(mode, persist = true) {
      const resolvedTheme = resolveTheme(mode);
      document.documentElement.dataset.themeMode = mode;
      document.documentElement.dataset.themeResolved = resolvedTheme;
      document.documentElement.style.colorScheme = resolvedTheme;
      if (themeColorMeta) {
        themeColorMeta.setAttribute('content', resolvedTheme === 'dark' ? '#110f0d' : '#f5f0e8');
      }
      updateThemeButtons(mode);
      updateUtilityTriggerIcon(mode);
      if (!persist) return;
      try {
        localStorage.setItem(THEME_STORAGE_KEY, mode);
      } catch {}
    }

    function setOnboarding(open) {
      onboardingEl.classList.toggle('open', open);
      onboardingEl.setAttribute('aria-hidden', String(!open));
    }

    function dismissOnboarding() {
      setOnboarding(false);
      try {
        localStorage.setItem(ONBOARDING_STORAGE_KEY, 'true');
      } catch {}
    }

    /* ── Constants & state ── */
    const DIFFICULTIES = {
      easy:   { seconds: false },
      medium: { seconds: false },
      hard:   { seconds: true },
    };

    let diff = 'easy';
    let targetHour = 12, targetMinute = 0, targetSecond = 0;
    let currentMinutes = 0, currentSeconds = 0;
    let dragMode = null;
    let prevAngle = 0;
    let dragCenter = null;
    let pendingPoint = null;
    let dragFrame = 0;
    let activePointerId = null;
    let dragElement = null;
    let tickAudioContext = null;
    let tickSampleBuffer = null;
    let tickSamplePromise = null;
    let lastTickAt = 0;
    let lastDifficultyActivationAt = 0;
    let lastDragMinuteStep = null;
    let lastDragSecondStep = null;
    let isSecondsMode = false;
    let isShowActive = false;
    let score = 0, streak = 0, bestStreak = 0;
    let checkTimer = null, hintTimer = null;

    /* ── DOM refs ── */
    const clockEl        = document.getElementById('clock');
    const checkBtn       = document.getElementById('checkBtn');
    const challengeTimeEl = document.getElementById('challengeTime');
    const showBtn        = document.getElementById('showBtn');
    const showButtonLabelEl = document.getElementById('showButtonLabel');
    const showValueEl    = document.getElementById('showValue');
    const utilityMenu    = document.getElementById('utilityMenu');
    const utilityTrigger = document.getElementById('utilityTrigger');
    const centerHintBtn  = document.getElementById('centerHintBtn');
    const onboardingEl   = document.getElementById('onboarding');
    const onboardingCloseBtn = document.getElementById('onboardingClose');

    const scoreCorrectEl = document.getElementById('scoreCorrect');
    const scoreStreakEl  = document.getElementById('scoreStreak');
    const scoreBestEl    = document.getElementById('scoreBest');
    const themeButtons   = document.querySelectorAll('.theme-btn');
    const difficultyBarEl = document.getElementById('difficultyBar');
    const difficultyButtons = document.querySelectorAll('.difficulty-btn');

    /* ── Build clock face ── */
    const hourHand   = document.createElement('div');
    const minuteHand = document.createElement('div');
    const secondHand = document.createElement('div');
    const hintHour   = document.createElement('div');
    const hintMinute = document.createElement('div');

    hourHand.className   = 'hand hour-hand';
    minuteHand.className = 'hand minute-hand';
    secondHand.className = 'hand second-hand';
    hintHour.className   = 'hint-hand hint-hour';
    hintMinute.className = 'hint-hand hint-minute';

    function buildClock() {
      for (let i = 0; i < 60; i++) {
        const tick = document.createElement('div');
        if (i % 5 === 0) tick.className = 'tick big';
        else if (i % 5 !== 0 && i % 5 !== 0) tick.className = 'tick small';
        else tick.className = 'tick fifth';
        tick.style.transform = `rotate(${i * 6}deg)`;
        clockEl.appendChild(tick);
      }
      const secondRadius = 47.6;
      for (let s = 0; s < 60; s++) {
        const angle = (s / 60) * Math.PI * 2;
        const el = document.createElement('div');
        el.className = 'second-label';
        el.textContent = s;
        el.style.left = `${50 + secondRadius * Math.sin(angle)}%`;
        el.style.top  = `${50 - secondRadius * Math.cos(angle)}%`;
        clockEl.appendChild(el);
      }
      const r = 37;
      for (let n = 1; n <= 12; n++) {
        const angle = (n / 12) * Math.PI * 2;
        const el = document.createElement('div');
        el.className = 'number';
        el.textContent = n;
        el.style.left = `${50 + r * Math.sin(angle)}%`;
        el.style.top  = `${50 - r * Math.cos(angle)}%`;
        clockEl.appendChild(el);
      }
      clockEl.appendChild(hintHour);
      clockEl.appendChild(hintMinute);
      clockEl.appendChild(hourHand);
      clockEl.appendChild(minuteHand);
      clockEl.appendChild(secondHand);
    }

    /* ── Angle helpers ── */
    function normAngle(a) { return ((a % 360) + 360) % 360; }
    function shortDelta(prev, next) {
      let d = normAngle(next) - normAngle(prev);
      if (d > 180)  d -= 360;
      if (d < -180) d += 360;
      return d;
    }

    function snappedMinuteFromCurrent() {
      return ((Math.round(currentMinutes) % 720) + 720) % 720;
    }

    function snappedSecondFromCurrent() {
      return ((Math.round(currentSeconds) % 60) + 60) % 60;
    }

    function nearestWrappedValue(target, current, modulo) {
      let best = target;
      let bestDistance = Infinity;
      for (const offset of [-modulo, 0, modulo]) {
        const candidate = target + offset;
        const distance = Math.abs(candidate - current);
        if (distance < bestDistance) {
          best = candidate;
          bestDistance = distance;
        }
      }
      return best;
    }

    function setClockFromMinutes(m) {
      currentMinutes = ((m % 720) + 720) % 720;
      const hA = currentMinutes * 0.5;
      const mA = (currentMinutes % 60) * 6;
      hourHand.style.transform   = `translate(-50%, -100%) rotate(${hA}deg)`;
      minuteHand.style.transform = `translate(-50%, -100%) rotate(${mA}deg)`;
    }

    function setClockFromSeconds(s) {
      currentSeconds = ((s % 60) + 60) % 60;
      const sA = currentSeconds * 6;
      secondHand.style.transform = `translate(-50%, -100%) rotate(${sA}deg)`;
    }

    function ensureTickAudio() {
      if (!window.AudioContext && !window.webkitAudioContext) return null;
      if (!tickAudioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        tickAudioContext = new AudioCtx();
      }
      return tickAudioContext;
    }

    function preloadTickSample() {
      const ctx = ensureTickAudio();
      if (!ctx || tickSampleBuffer || tickSamplePromise) return tickSamplePromise;
      tickSamplePromise = fetch('./tick-reference.wav')
        .then((response) => response.arrayBuffer())
        .then((audioData) => ctx.decodeAudioData(audioData.slice(0)))
        .then((buffer) => {
          tickSampleBuffer = buffer;
          return buffer;
        })
        .catch(() => null)
        .finally(() => {
          tickSamplePromise = null;
        });
      return tickSamplePromise;
    }

    function triggerTickSound(ctx, mode = 'minute') {
      const now = ctx.currentTime;
      const tone = ctx.createOscillator();
      const sparkle = ctx.createOscillator();
      const transient = ctx.createOscillator();
      const shimmer = ctx.createOscillator();
      const gain = ctx.createGain();
      const toneGain = ctx.createGain();
      const sparkleGain = ctx.createGain();
      const transientGain = ctx.createGain();
      const shimmerGain = ctx.createGain();
      const highpass = ctx.createBiquadFilter();
      const lowpass = ctx.createBiquadFilter();
      const presence = ctx.createBiquadFilter();
      const softClip = ctx.createWaveShaper();
      const isSecondTick = mode === 'second';
      tone.type = 'sine';
      sparkle.type = 'sine';
      transient.type = 'triangle';
      shimmer.type = 'sine';
      tone.frequency.setValueAtTime(isSecondTick ? 1860 : 1660, now);
      tone.frequency.exponentialRampToValueAtTime(isSecondTick ? 1500 : 1320, now + 0.022);
      sparkle.frequency.setValueAtTime(isSecondTick ? 2460 : 2180, now);
      sparkle.frequency.exponentialRampToValueAtTime(isSecondTick ? 1960 : 1720, now + 0.03);
      transient.frequency.setValueAtTime(isSecondTick ? 1480 : 1280, now);
      transient.frequency.exponentialRampToValueAtTime(isSecondTick ? 1210 : 1040, now + 0.006);
      shimmer.frequency.setValueAtTime(isSecondTick ? 2960 : 2620, now);
      shimmer.frequency.exponentialRampToValueAtTime(isSecondTick ? 2380 : 2100, now + 0.038);
      highpass.type = 'highpass';
      highpass.frequency.setValueAtTime(isSecondTick ? 860 : 720, now);
      highpass.Q.value = 0.42;
      lowpass.type = 'lowpass';
      lowpass.frequency.setValueAtTime(isSecondTick ? 3500 : 3050, now);
      lowpass.Q.value = 0.18;
      presence.type = 'peaking';
      presence.frequency.setValueAtTime(isSecondTick ? 2260 : 1980, now);
      presence.Q.value = 0.9;
      presence.gain.value = 1.3;
      softClip.curve = new Float32Array([-0.92, -0.7, -0.34, 0, 0.34, 0.7, 0.92]);
      softClip.oversample = '2x';
      toneGain.gain.value = isSecondTick ? 0.9 : 0.94;
      sparkleGain.gain.value = isSecondTick ? 0.3 : 0.24;
      transientGain.gain.value = isSecondTick ? 0.18 : 0.14;
      shimmerGain.gain.value = isSecondTick ? 0.18 : 0.14;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(isSecondTick ? 0.0105 : 0.009, now + 0.0018);
      gain.gain.exponentialRampToValueAtTime(isSecondTick ? 0.0042 : 0.0035, now + 0.014);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.048);
      tone.connect(toneGain);
      sparkle.connect(sparkleGain);
      transient.connect(transientGain);
      shimmer.connect(shimmerGain);
      toneGain.connect(highpass);
      sparkleGain.connect(highpass);
      transientGain.connect(highpass);
      shimmerGain.connect(highpass);
      highpass.connect(lowpass);
      lowpass.connect(presence);
      presence.connect(softClip);
      softClip.connect(gain);
      gain.connect(ctx.destination);
      tone.start(now);
      sparkle.start(now);
      transient.start(now);
      shimmer.start(now);
      tone.stop(now + 0.05);
      sparkle.stop(now + 0.045);
      transient.stop(now + 0.009);
      shimmer.stop(now + 0.05);
    }

    function playReferenceTickSample(ctx, mode = 'minute') {
      if (!tickSampleBuffer) return;
      const source = ctx.createBufferSource();
      const gain = ctx.createGain();
      const highpass = ctx.createBiquadFilter();
      const lowpass = ctx.createBiquadFilter();
      const isSecondTick = mode === 'second';
      source.buffer = tickSampleBuffer;
      source.playbackRate.value = isSecondTick ? 1.08 : 1.0;
      highpass.type = 'highpass';
      highpass.frequency.value = isSecondTick ? 980 : 840;
      lowpass.type = 'lowpass';
      lowpass.frequency.value = isSecondTick ? 5200 : 4600;
      gain.gain.value = isSecondTick ? 0.28 : 0.24;
      source.connect(highpass);
      highpass.connect(lowpass);
      lowpass.connect(gain);
      gain.connect(ctx.destination);
      source.start();
    }

    function playTickSound(mode = 'minute') {
      const ctx = ensureTickAudio();
      if (!ctx) return;
      preloadTickSample();
      const tickNow = performance.now();
      const minInterval = mode === 'second' ? 18 : 24;
      if (tickNow - lastTickAt < minInterval) return;
      lastTickAt = tickNow;
      if (ctx.state === 'running') {
        triggerTickSound(ctx, mode);
        playReferenceTickSample(ctx, mode);
        return;
      }
      ctx.resume()
        .then(() => {
          if (ctx.state === 'running') {
            triggerTickSound(ctx, mode);
            playReferenceTickSample(ctx, mode);
          }
        })
        .catch(() => {});
    }

    function maybePlayDragTick(type, value) {
      if (type === 'second') {
        const step = ((value % 60) + 60) % 60;
        if (lastDragSecondStep === step) return;
        if (lastDragSecondStep !== null) playTickSound('second');
        lastDragSecondStep = step;
        return;
      }
      const step = ((value % 720) + 720) % 720;
      if (lastDragMinuteStep === step) return;
      if (lastDragMinuteStep !== null) playTickSound('minute');
      lastDragMinuteStep = step;
    }

    /* ── Pointer helpers ── */
    function getPoint(e) {
      if (e.touches?.length)        return { x: e.touches[0].clientX,        y: e.touches[0].clientY };
      if (e.changedTouches?.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function pointerAngle(clientX, clientY) {
      const r = dragCenter ? null : clockEl.getBoundingClientRect();
      const cx = dragCenter ? dragCenter.x : r.left + r.width / 2;
      const cy = dragCenter ? dragCenter.y : r.top + r.height / 2;
      return normAngle(Math.atan2(clientX - cx, -(clientY - cy)) * (180 / Math.PI));
    }

    function pointToSegmentDistance(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const abLenSq = abx * abx + aby * aby;
      if (!abLenSq) return Math.hypot(px - ax, py - ay);
      const apx = px - ax;
      const apy = py - ay;
      const t = Math.max(0, Math.min(1, ((apx * abx) + (apy * aby)) / abLenSq));
      const closestX = ax + abx * t;
      const closestY = ay + aby * t;
      return Math.hypot(px - closestX, py - closestY);
    }

    function getVisibleHandSegments() {
      const rect = clockEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const minuteLength = rect.width * 0.36;
      const hourLength = rect.width * 0.24;
      const secondLength = rect.width * 0.40;
      const minuteAngle = (((currentMinutes % 60) + 60) % 60) * 6 * (Math.PI / 180);
      const hourAngle = ((((currentMinutes % 720) + 720) % 720) * 0.5) * (Math.PI / 180);
      const secondAngle = ((((currentSeconds % 60) + 60) % 60) * 6) * (Math.PI / 180);
      const segments = [
        {
          type: 'minute',
          threshold: 42,
          ax: cx,
          ay: cy,
          bx: cx + Math.sin(minuteAngle) * minuteLength,
          by: cy - Math.cos(minuteAngle) * minuteLength,
        },
        {
          type: 'hour',
          threshold: 46,
          ax: cx,
          ay: cy,
          bx: cx + Math.sin(hourAngle) * hourLength,
          by: cy - Math.cos(hourAngle) * hourLength,
        },
      ];
      if (isSecondsMode) {
        segments.unshift({
          type: 'second',
          threshold: 30,
          ax: cx,
          ay: cy,
          bx: cx + Math.sin(secondAngle) * secondLength,
          by: cy - Math.cos(secondAngle) * secondLength,
        });
      }
      return segments;
    }

    function getNearestHandType(clientX, clientY) {
      const segments = getVisibleHandSegments();
      let best = null;
      for (const segment of segments) {
        const lineDistance = pointToSegmentDistance(
          clientX,
          clientY,
          segment.ax,
          segment.ay,
          segment.bx,
          segment.by
        );
        const tipDistance = Math.hypot(clientX - segment.bx, clientY - segment.by) * 0.72;
        const distance = Math.min(lineDistance, tipDistance);
        if (distance > segment.threshold) continue;
        if (!best || distance < best.distance) {
          best = { type: segment.type, distance };
        }
      }
      return best ? best.type : null;
    }

    /* ── Drag logic ── */
    function snapDraggedHandToNearestStep() {
      if (dragMode === 'minute' || dragMode === 'hour') {
        const snappedMinutes = nearestWrappedValue(
          Math.round(currentMinutes),
          currentMinutes,
          720
        );
        currentMinutes = Math.round(snappedMinutes);
        setClockFromMinutes(currentMinutes);
        maybePlayDragTick('minute', snappedMinuteFromCurrent());
      } else if (dragMode === 'second') {
        currentSeconds = Math.round(currentSeconds);
        setClockFromSeconds(currentSeconds);
        maybePlayDragTick('second', snappedSecondFromCurrent());
      }
      if (isShowActive) updateBadge();
    }

    function applyDragMove() {
      dragFrame = 0;
      if (!dragMode || !pendingPoint) return;
      const { x, y } = pendingPoint;
      pendingPoint = null;
      const angle = pointerAngle(x, y);
      prevAngle = angle;

      if (dragMode === 'minute') {
        const minuteValue = angle / 6;
        currentMinutes = nearestWrappedValue(
          Math.round(currentMinutes / 60) * 60 + minuteValue,
          currentMinutes,
          60
        );
        setClockFromMinutes(currentMinutes);
        maybePlayDragTick('minute', Math.round(currentMinutes));
      } else if (dragMode === 'hour') {
        const totalMinuteValue = angle * 2;
        currentMinutes = nearestWrappedValue(totalMinuteValue, currentMinutes, 720);
        setClockFromMinutes(currentMinutes);
        maybePlayDragTick('minute', Math.round(currentMinutes));
      } else if (dragMode === 'second') {
        currentSeconds = angle / 6;
        setClockFromSeconds(currentSeconds);
        maybePlayDragTick('second', Math.round(currentSeconds));
      }
      if (isShowActive) updateBadge();
    }

    function onMove(e) {
      if (!dragMode) return;
      if (activePointerId !== null && e.pointerId !== undefined && e.pointerId !== activePointerId) return;
      e.preventDefault();
      const sourceEvent = typeof e.getCoalescedEvents === 'function'
        ? (e.getCoalescedEvents().slice(-1)[0] || e)
        : e;
      pendingPoint = getPoint(sourceEvent);
      if (!dragFrame) dragFrame = requestAnimationFrame(applyDragMove);
    }

    function endDrag(e) {
      if (activePointerId !== null && e?.pointerId !== undefined && e.pointerId !== activePointerId) return;
      if (dragFrame) {
        cancelAnimationFrame(dragFrame);
        dragFrame = 0;
      }
      if (pendingPoint) applyDragMove();
      if (dragMode) snapDraggedHandToNearestStep();
      if (dragElement) {
        dragElement.classList.remove('dragging');
        if (activePointerId !== null && typeof dragElement.releasePointerCapture === 'function') {
          try { dragElement.releasePointerCapture(activePointerId); } catch {}
        }
      }
      dragMode = null;
      dragCenter = null;
      pendingPoint = null;
      activePointerId = null;
      dragElement = null;
      lastDragMinuteStep = null;
      lastDragSecondStep = null;
      document.body.classList.remove('dragging');
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', endDrag);
      window.removeEventListener('pointercancel', endDrag);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('mouseup', endDrag);
      window.removeEventListener('touchend', endDrag);
      window.removeEventListener('touchcancel', endDrag);
    }

    function startDrag(type, e) {
      dragMode = type;
      e.preventDefault();
      const audioCtx = ensureTickAudio();
      if (audioCtx && audioCtx.state !== 'running') audioCtx.resume().catch(() => {});
      document.body.classList.add('dragging');
      dragElement = e.currentTarget || null;
      activePointerId = e.pointerId ?? null;
      lastDragMinuteStep = snappedMinuteFromCurrent();
      lastDragSecondStep = snappedSecondFromCurrent();
      if (dragElement) dragElement.classList.add('dragging');
      if (dragElement && activePointerId !== null && typeof dragElement.setPointerCapture === 'function') {
        try { dragElement.setPointerCapture(activePointerId); } catch {}
      }
      const rect = clockEl.getBoundingClientRect();
      dragCenter = {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2,
      };
      const { x, y } = getPoint(e);
      prevAngle = pointerAngle(x, y);
      if (activePointerId !== null) {
        window.addEventListener('pointermove', onMove, { passive: false });
        window.addEventListener('pointerup', endDrag);
        window.addEventListener('pointercancel', endDrag);
        return;
      }
      window.addEventListener('mousemove', onMove, { passive: false });
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', endDrag);
      window.addEventListener('touchend', endDrag);
      window.addEventListener('touchcancel', endDrag);
    }

    function startNearestHandDrag(e) {
      if (dragMode) return;
      if (e.target === centerHintBtn) return;
      const { x, y } = getPoint(e);
      const nearestHand = getNearestHandType(x, y);
      if (!nearestHand) return;
      const handTarget = nearestHand === 'hour'
        ? hourHand
        : nearestHand === 'minute'
          ? minuteHand
          : secondHand;
      startDrag(nearestHand, {
        ...e,
        currentTarget: handTarget,
        clientX: x,
        clientY: y,
      });
    }

    /* ── Current time reading ── */
    function getClockParts() {
      const mw = ((currentMinutes % 720) + 720) % 720;
      const sw = ((Math.round(currentSeconds) % 60) + 60) % 60;
      const rm = Math.round(mw) % 720;
      return {
        hour12: Math.floor(rm / 60) % 12 || 12,
        minute:  rm % 60,
        second:  sw,
      };
    }

    function fmt(h, m, s, secs) {
      let totalSeconds = (((h % 12) + 12) % 12) * 3600;
      totalSeconds += (((m % 60) + 60) % 60) * 60;
      totalSeconds += ((s % 60) + 60) % 60;
      totalSeconds += Math.floor(m / 60) * 3600;
      totalSeconds += Math.floor(s / 60) * 60;
      const hour12 = ((Math.floor(totalSeconds / 3600) % 12) || 12);
      const minute = Math.floor(totalSeconds / 60) % 60;
      const second = totalSeconds % 60;
      const base = `${hour12}:${String(minute).padStart(2,'0')}`;
      return secs ? `${base}:${String(second).padStart(2,'0')}` : base;
    }

    /* ── Badge ── */
    function updateBadge() {
      const { hour12, minute, second } = getClockParts();
      if (isShowActive) showValueEl.textContent = fmt(hour12, minute, second, isSecondsMode);
    }

    /* ── Target time display ── */
    const targetTimeTextEl = document.getElementById('targetTimeText');

    function updateTargetDisplay() {
      challengeTimeEl.classList.toggle('seconds-mode', isSecondsMode);
      targetTimeTextEl.textContent = fmt(targetHour, targetMinute, targetSecond, isSecondsMode);
    }

    /* ── Random target ── */
    function randomTarget() {
      targetHour   = Math.floor(Math.random() * 12) + 1;
      targetSecond = isSecondsMode ? Math.floor(Math.random() * 60) : 0;

      if (diff === 'easy') {
        targetMinute = Math.floor(Math.random() * 12) * 5;
      } else {
        targetMinute = Math.floor(Math.random() * 60);
      }

      updateTargetDisplay();
      hideHint();
      checkBtn.classList.remove('correct', 'wrong');
      checkBtn.textContent = 'Check Answer';

      if (isShowActive) {
        isShowActive = false;
        showBtn.classList.remove('show-active');
      }
    }

    /* ── Show button ── */
    function updateShowBtn() {
      showBtn.classList.toggle('show-active', isShowActive);
      showBtn.setAttribute('aria-label', isShowActive ? 'Hide current time' : 'Show current time');
      showButtonLabelEl.textContent = 'Show';
    }

    function toggleShow() {
      isShowActive = !isShowActive;
      updateShowBtn();
      if (isShowActive) updateBadge();
    }

    function setDifficulty(nextDiff, reroll = true) {
      if (!DIFFICULTIES[nextDiff]) return;
      diff = nextDiff;
      const indexMap = { easy: 0, medium: 1, hard: 2 };
      difficultyBarEl?.style.setProperty('--difficulty-index', String(indexMap[nextDiff] ?? 0));
      difficultyButtons.forEach((button) => {
        const active = button.dataset.difficulty === nextDiff;
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
      setSecondsMode(DIFFICULTIES[nextDiff].seconds);
      if (reroll) randomTarget();
    }

    function activateDifficulty(button, event) {
      if (!button) return;
      if (event) event.preventDefault();
      const now = performance.now();
      if (now - lastDifficultyActivationAt < 180) return;
      lastDifficultyActivationAt = now;
      setDifficulty(button.dataset.difficulty);
    }

    /* ── Hint ghost hands ── */
    function showHint() {
      const totalM = targetHour * 60 + targetMinute;
      const hA = totalM * 0.5;
      const mA = targetMinute * 6;
      hintHour.style.transform   = `translate(-50%, -100%) rotate(${hA}deg)`;
      hintMinute.style.transform = `translate(-50%, -100%) rotate(${mA}deg)`;
      hintHour.classList.add('visible');
      hintMinute.classList.add('visible');
      if (hintTimer) clearTimeout(hintTimer);
      hintTimer = setTimeout(hideHint, 3000);
    }
    function hideHint() {
      hintHour.classList.remove('visible');
      hintMinute.classList.remove('visible');
    }

    function checkAnswer() {
      const { hour12, minute, second } = getClockParts();
      const hOk = hour12 === targetHour;
      const mOk = minute  === targetMinute;
      const sOk = !isSecondsMode || second === targetSecond;
      const correct = hOk && mOk && sOk;

      checkBtn.classList.remove('correct', 'wrong');
      checkBtn.classList.add(correct ? 'correct' : 'wrong');
      checkBtn.textContent = correct ? 'Correct' : 'Try Again';

      if (correct) {
        score++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        setTimeout(() => randomTarget(), 1400);
      } else {
        streak = 0;
        setTimeout(() => {
          checkBtn.classList.remove('correct', 'wrong');
          checkBtn.textContent = 'Check Answer';
        }, 1200);
      }

      scoreCorrectEl.textContent = score;
      scoreStreakEl.textContent  = streak;
      scoreBestEl.textContent    = bestStreak;
    }

    /* ── Seconds mode ── */
    function setSecondsMode(enabled) {
      isSecondsMode = enabled;
      secondHand.style.display = isSecondsMode ? 'block' : 'none';
      if (!isSecondsMode) {
        currentSeconds = 0;
        targetSecond = 0;
        setClockFromSeconds(0);
      } else {
        currentSeconds = snappedSecondFromCurrent();
        setClockFromSeconds(currentSeconds);
      }
      updateTargetDisplay();
      if (isShowActive) updateBadge();
    }

    themeButtons.forEach((button) => {
      button.addEventListener('click', () => {
        applyTheme(button.dataset.themeMode);
        setUtilityMenu(false);
      });
    });

    difficultyButtons.forEach((button) => {
      if (window.PointerEvent) {
        button.addEventListener('pointerdown', (event) => {
          activateDifficulty(button, event);
        });
      } else {
        button.addEventListener('touchstart', (event) => {
          activateDifficulty(button, event);
        }, { passive: false });
        button.addEventListener('mousedown', (event) => {
          activateDifficulty(button, event);
        });
      }
      button.addEventListener('click', (event) => {
        activateDifficulty(button, event);
      });
    });

    utilityTrigger.addEventListener('click', (event) => {
      event.stopPropagation();
      setUtilityMenu(!utilityMenu.classList.contains('open'));
    });

    document.addEventListener('click', (event) => {
      if (!utilityMenu.contains(event.target)) setUtilityMenu(false);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') setUtilityMenu(false);
      if (event.key === 'Escape' && onboardingEl.classList.contains('open')) dismissOnboarding();
    });

    onboardingCloseBtn.addEventListener('click', dismissOnboarding);
    onboardingEl.addEventListener('click', (event) => {
      if (event.target === onboardingEl) dismissOnboarding();
    });

    const systemThemeListener = () => {
      if ((document.documentElement.dataset.themeMode || 'system') === 'system') {
        applyTheme('system', false);
      }
    };
    if (typeof themeQuery.addEventListener === 'function') {
      themeQuery.addEventListener('change', systemThemeListener);
    } else if (typeof themeQuery.addListener === 'function') {
      themeQuery.addListener(systemThemeListener);
    }

    /* ── Events ── */
    if (window.PointerEvent) {
      hourHand.addEventListener('pointerdown',   e => startDrag('hour', e), { passive: false });
      minuteHand.addEventListener('pointerdown', e => startDrag('minute', e), { passive: false });
      secondHand.addEventListener('pointerdown', e => startDrag('second', e), { passive: false });
      clockEl.addEventListener('pointerdown', startNearestHandDrag, { passive: false });
    } else {
      hourHand.addEventListener('mousedown',   e => startDrag('hour', e));
      hourHand.addEventListener('touchstart',  e => startDrag('hour', e), { passive: false });
      minuteHand.addEventListener('mousedown', e => startDrag('minute', e));
      minuteHand.addEventListener('touchstart',e => startDrag('minute', e), { passive: false });
      secondHand.addEventListener('mousedown', e => startDrag('second', e));
      secondHand.addEventListener('touchstart',e => startDrag('second', e), { passive: false });
      clockEl.addEventListener('mousedown', startNearestHandDrag);
      clockEl.addEventListener('touchstart', startNearestHandDrag, { passive: false });
    }

    checkBtn.addEventListener('click',       checkAnswer);
    challengeTimeEl.addEventListener('click', randomTarget);
    showBtn.addEventListener('click',        toggleShow);
    centerHintBtn.addEventListener('click',  e => { e.stopPropagation(); showHint(); });

    /* ── Init ── */
    buildClock();
    setClockFromMinutes(0);
    setClockFromSeconds(0);
    let savedThemeMode = 'system';
    try {
      savedThemeMode = localStorage.getItem(THEME_STORAGE_KEY) || 'system';
    } catch {}
    applyTheme(savedThemeMode, false);
    updateShowBtn();
    setDifficulty('easy', false);
    randomTarget();
    preloadTickSample();
    let hasSeenOnboarding = false;
    try {
      hasSeenOnboarding = localStorage.getItem(ONBOARDING_STORAGE_KEY) === 'true';
    } catch {}
    if (!hasSeenOnboarding) setOnboarding(true);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
